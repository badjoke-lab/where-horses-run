name: Apply Calendar ops complete

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-ops-v1-complete
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-calendar-operations-v1-completion.mjs
      - run: node scripts/timetable/build-operations-review-package.mjs
      - run: node scripts/check-calendar-operations-v1-release-gate.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-baseline-reconciliation.mjs
      - run: npm install --package-lock=false
      - run: npm run build
      - name: Commit state
        run: |
          rm -f scripts/apply-calendar-operations-v1-completion.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Calendar Operations v1"
          git push origin HEAD:calendar-ops-v1-complete
