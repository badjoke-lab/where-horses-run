name: Local racing pilot diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-nar-link-only-pilot
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Run validator
        run: |
          set +e
          node scripts/check-local-racing-pilot-foundation.mjs > /tmp/local-racing-pilot.log 2>&1
          status=$?
          cat /tmp/local-racing-pilot.log
          exit $status
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-racing-pilot-diagnostic
          path: /tmp/local-racing-pilot.log
          retention-days: 30
