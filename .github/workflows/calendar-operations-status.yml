name: Calendar operations status

on:
  pull_request:
    paths:
      - 'data/generated/timetable/operations-status.json'
      - 'data/static/**'
      - 'data/candidates/japan-jra-candidates.json'
      - 'data/generated/timetable/public/**'
      - 'scripts/timetable/build-operations-status.mjs'
      - 'scripts/check-calendar-operations-status.mjs'
      - '.github/workflows/calendar-operations-review.yml'
      - '.github/workflows/calendar-operations-status.yml'
  push:
    branches: [main]
    paths:
      - 'data/generated/timetable/operations-status.json'
      - 'data/static/**'
      - 'data/candidates/japan-jra-candidates.json'
      - 'data/generated/timetable/public/**'
      - 'scripts/timetable/build-operations-status.mjs'
      - 'scripts/check-calendar-operations-status.mjs'
      - '.github/workflows/calendar-operations-review.yml'
      - '.github/workflows/calendar-operations-status.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-calendar-operations-status.mjs
      - run: node scripts/timetable/build-operations-status.mjs --reference-date 2026-07-01 --dry-run
      - run: node scripts/check-calendar-runtime-import-boundary.mjs
