name: Calendar pipeline v1 candidate contract

on:
  pull_request:
    paths:
      - 'data/candidates/pipeline-v1.sample.json'
      - 'data/static/timetable-candidate-v1.schema.json'
      - 'docs/calendar/pipeline-v1-candidate-contract.md'
      - 'scripts/check-calendar-pipeline-v1-candidate-contract.mjs'
      - 'src/lib/timetable/pipelineTypes.ts'
      - '.github/workflows/calendar-pipeline-v1-candidate-contract.yml'
  push:
    branches:
      - main
    paths:
      - 'data/candidates/pipeline-v1.sample.json'
      - 'data/static/timetable-candidate-v1.schema.json'
      - 'docs/calendar/pipeline-v1-candidate-contract.md'
      - 'scripts/check-calendar-pipeline-v1-candidate-contract.mjs'
      - 'src/lib/timetable/pipelineTypes.ts'
      - '.github/workflows/calendar-pipeline-v1-candidate-contract.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Validate candidate v1 contract and negative fixtures
        run: node scripts/check-calendar-pipeline-v1-candidate-contract.mjs
      - name: Confirm public build still succeeds
        run: |
          npm install --package-lock=false
          npm run build
