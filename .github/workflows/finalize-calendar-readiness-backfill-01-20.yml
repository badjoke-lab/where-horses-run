name: Finalize Calendar readiness backfill 01-20

on:
  pull_request:
    paths:
      - '.github/workflows/finalize-calendar-readiness-backfill-01-20.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-01-20
          fetch-depth: 0
      - name: Apply reviewed backfill
        run: python scripts/finalize-calendar-readiness-backfill-01-20.py
      - name: Remove one-time files
        run: |
          rm -f \
            .tmp/calendar-readiness-authority-01-20.zlib.b64 \
            .tmp/calendar-readiness-registry-01-20.zlib.b64 \
            scripts/finalize-calendar-readiness-backfill-01-20.py \
            .github/workflows/finalize-calendar-readiness-backfill-01-20.yml
          rmdir .tmp 2>/dev/null || true
      - name: Validate canonical state
        run: |
          node scripts/check-calendar-contracts.mjs
          node scripts/check-calendar-readiness-backfill-01-20.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-country-page-programme-roadmap.mjs
      - name: Commit canonical state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '[CF-Pages-Skip] Complete Calendar readiness backfill 01-20'
          git push origin HEAD:calendar-readiness-backfill-01-20
