name: Verify production country pages 37-44

on:
  push:
    branches:
      - verify-production-37-44
    paths:
      - '.github/workflows/verify-production-37-44.yml'
  pull_request:
    paths:
      - '.github/workflows/verify-production-37-44.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Fetch all production routes
        env:
          PRODUCTION_BASE: https://whr.badjoke-lab.com
        run: |
          mkdir -p production-verification/html
          for slug in \
            malaysia \
            thailand \
            philippines \
            mauritius \
            argentina \
            germany \
            italy \
            spain
          do
            for prefix in countries ja/countries
            do
              route="$prefix/$slug"
              output="production-verification/html/${route//\//-}.html"
              curl --fail --show-error --silent --location \
                --retry 24 --retry-delay 5 --retry-all-errors \
                --connect-timeout 15 --max-time 60 \
                "$PRODUCTION_BASE/$route/" \
                --output "$output"
              test -s "$output"
            done
          done
      - name: Validate production HTML
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('production-verification/html')
          slugs = [
              'malaysia', 'thailand', 'philippines', 'mauritius',
              'argentina', 'germany', 'italy', 'spain',
          ]
          for slug in slugs:
              en = (root / f'countries-{slug}.html').read_text(encoding='utf-8')
              ja = (root / f'ja-countries-{slug}.html').read_text(encoding='utf-8')
              expected_en = f'https://whr.badjoke-lab.com/countries/{slug}/'
              expected_ja = f'https://whr.badjoke-lab.com/ja/countries/{slug}/'
              for label, html, canonical, alternate in [
                  ('EN', en, expected_en, expected_ja),
                  ('JA', ja, expected_ja, expected_en),
              ]:
                  if html.count('<h1') != 1:
                      raise SystemExit(f'{slug} {label}: expected exactly one h1')
                  if canonical not in html or alternate not in html:
                      raise SystemExit(f'{slug} {label}: canonical or alternate missing')
                  lowered = html.lower()
                  if '<iframe' in lowered or '<video' in lowered or 'watch here' in lowered:
                      raise SystemExit(f'{slug} {label}: prohibited output found')
                  for prohibited in ['Start time</th>', '開始時刻</th>', 'Timezone</th>', 'タイムゾーン</th>']:
                      if prohibited in html:
                          raise SystemExit(f'{slug} {label}: C-rank column leaked: {prohibited}')

          print('PRODUCTION_COUNTRY_PAGES_37_44_VALID')
          print('ROUTES_CHECKED: 8 EN + 8 JA = 16')
          PY
      - name: Upload production verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-37-44
          path: production-verification
          if-no-files-found: error
          retention-days: 7
