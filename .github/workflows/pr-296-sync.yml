name: PR 296 publication synchronization

on:
  push:
    branches: [country-pages-13-20-publication-qa]
    paths: ['.github/workflows/pr-296-sync.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-13-20-publication-qa
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/pr-296-component-sync.mjs
      - run: node scripts/pr-296-tracker-sync.mjs
      - run: node scripts/pr-296-roadmap-sync.mjs
      - name: Commit synchronized files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/CountryDetailPage.astro docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md
          git commit -m 'Apply country page publication QA 13-20'
          git push origin HEAD:country-pages-13-20-publication-qa
