name: Apply JRA review priority

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: jra-review-package-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-jra-review-priority-fix.mjs
      - run: node scripts/check-jra-review-package.mjs
      - name: Commit priority fix
        run: |
          rm -f scripts/apply-jra-review-priority-fix.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/timetable/jra-final-review-package-core.mjs
          git add -u scripts/apply-jra-review-priority-fix.mjs
          git commit -m "Fix JRA review action priority"
          git push origin HEAD:jra-review-package-v3
