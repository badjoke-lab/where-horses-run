name: Country profiles 13-20

on:
  pull_request:
    paths:
      - 'data/static/country-page-countries-15-20.json'
      - 'data/static/country-page-sources-14-*.json'
      - 'data/static/country-page-sources-15-*.json'
      - 'data/static/country-page-sources-16-*.json'
      - 'data/static/country-page-sources-17-*.json'
      - 'data/static/country-page-sources-18-*.json'
      - 'data/static/country-page-sources-19-*.json'
      - 'data/static/country-page-sources-20-*.json'
      - 'data/static/country-profiles-v2-13-*.json'
      - 'data/static/country-profiles-v2-14-*.json'
      - 'data/static/country-profiles-v2-15-*.json'
      - 'data/static/country-profiles-v2-16-*.json'
      - 'data/static/country-profiles-v2-17-*.json'
      - 'data/static/country-profiles-v2-18-*.json'
      - 'data/static/country-profiles-v2-19-*.json'
      - 'data/static/country-profiles-v2-20-*.json'
      - 'docs/country-pages/**'
      - 'src/lib/data.ts'
      - 'src/lib/country-profile-runtime.ts'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-profiles-13-20.mjs'
      - '.github/workflows/country-profiles-13-20.yml'
  push:
    branches: [main]
    paths:
      - 'data/static/country-page-countries-15-20.json'
      - 'data/static/country-page-sources-14-*.json'
      - 'data/static/country-page-sources-15-*.json'
      - 'data/static/country-page-sources-16-*.json'
      - 'data/static/country-page-sources-17-*.json'
      - 'data/static/country-page-sources-18-*.json'
      - 'data/static/country-page-sources-19-*.json'
      - 'data/static/country-page-sources-20-*.json'
      - 'data/static/country-profiles-v2-13-*.json'
      - 'data/static/country-profiles-v2-14-*.json'
      - 'data/static/country-profiles-v2-15-*.json'
      - 'data/static/country-profiles-v2-16-*.json'
      - 'data/static/country-profiles-v2-17-*.json'
      - 'data/static/country-profiles-v2-18-*.json'
      - 'data/static/country-profiles-v2-19-*.json'
      - 'data/static/country-profiles-v2-20-*.json'
      - 'docs/country-pages/**'
      - 'src/lib/data.ts'
      - 'src/lib/country-profile-runtime.ts'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-profiles-13-20.mjs'
      - '.github/workflows/country-profiles-13-20.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-profiles-13-20.mjs
      - run: node scripts/check-country-detail-profile-runtime.mjs
      - run: npm install
      - run: npm run build
