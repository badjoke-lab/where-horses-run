name: Execute final state update 53-60

on:
  pull_request:
    paths:
      - '.github/workflows/execute-53-60.yml'
  push:
    branches: [country-publish-53-60]
    paths:
      - '.github/workflows/execute-53-60.yml'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-publish-53-60
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/run-apply-pub-53-60.mjs
      - run: |
          npm install
          npm run build
      - run: |
          node scripts/check-country-page-publication-53-60.mjs
          node scripts/check-country-profiles-53-60.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - run: |
          rm -f .github/workflows/collect-rendered-preview-53-60.yml
          rm -f .github/workflows/rendered-preview-53-60.yml
          rm -f .github/workflows/apply-publication-53-60.yml
          rm -f .github/workflows/run-pub-53-60.yml
          rm -f .github/workflows/execute-53-60.yml
          rm -f scripts/rendered-preview-53-60.mjs
          rm -f scripts/apply-pub-53-60.mjs
          rm -f scripts/run-apply-pub-53-60.mjs
          rm -f final-publication-53-60.log
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '[CF-Pages-Skip] Finalize publication state 53-60'
          git push origin HEAD:country-publish-53-60
