name: Trigger publication finalizer 29-36

on:
  pull_request:
    paths:
      - '.github/workflows/trigger-finalize-publication-29-36.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-29-36-publication-final
          fetch-depth: 0
      - name: Execute the reviewed one-time finalizer
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/finalize-publication-29-36.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          if marker not in workflow or '\n          PY\n' not in workflow:
              raise SystemExit('finalizer Python block was not found')
          block = workflow.split(marker, 1)[1].split('\n          PY\n', 1)[0]
          exec(textwrap.dedent(block), {'__name__': '__main__'})
          PY
      - name: Remove all one-time workflow files
        run: |
          rm -f \
            .github/workflows/rendered-preview-qa-29-36.yml \
            .github/workflows/finalize-publication-29-36.yml \
            .github/workflows/trigger-finalize-publication-29-36.yml
      - name: Validate final state
        run: |
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - name: Commit final state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '[CF-Pages-Skip] Finalize publication state for entries 29-36'
          git push origin HEAD:country-pages-29-36-publication-final
