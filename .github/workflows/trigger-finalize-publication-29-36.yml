name: Trigger publication finalizer 29-36

on:
  pull_request:
    paths:
      - '.github/workflows/trigger-finalize-publication-29-36.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-29-36-publication-final
          fetch-depth: 0
      - name: Execute the reviewed one-time finalizer
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/finalize-publication-29-36.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          ending = '\n          PY\n'
          if marker not in workflow or ending not in workflow:
              raise SystemExit('finalizer Python block was not found')
          raw = workflow.split(marker, 1)[1].split(ending, 1)[0]
          block = '\n'.join(line[10:] if line.startswith('          ') else line for line in raw.splitlines())
          exec(compile(block, 'finalize-publication-29-36.py', 'exec'), {'__name__': '__main__'})

          programme_path = Path('scripts/check-country-page-programme.mjs')
          programme = programme_path.read_text(encoding='utf-8')
          old_slugs = """  'jamaica', 'trinidad-and-tobago', 'barbados', 'martinique'\n];"""
          new_slugs = """  'jamaica', 'trinidad-and-tobago', 'barbados', 'martinique',\n  'united-kingdom', 'united-states', 'australia', 'ireland', 'france', 'canada',\n  'saudi-arabia', 'india'\n];"""
          if old_slugs not in programme:
              raise SystemExit('published slug list target was not found')
          programme = programme.replace(old_slugs, new_slugs, 1)
          old_counts = "{ published: 28, profile_ready: 16, source_tested: 0, note_reviewed: 8, page_qa: 0, not_started: 46 }"
          new_counts = "{ published: 36, profile_ready: 8, source_tested: 0, note_reviewed: 8, page_qa: 0, not_started: 46 }"
          if old_counts not in programme:
              raise SystemExit('programme count target was not found')
          programme = programme.replace(old_counts, new_counts, 1)
          programme = programme.replace(
              "PROGRAMME_COUNTS: published=28 profile_ready=16 note_reviewed=8 not_started=46",
              "PROGRAMME_COUNTS: published=36 profile_ready=8 note_reviewed=8 not_started=46",
              1,
          )
          programme_path.write_text(programme, encoding='utf-8')

          calendar_path = Path('scripts/check-calendar-contracts.mjs')
          calendar = calendar_path.read_text(encoding='utf-8')
          old_start = "[paths.startHere, startHereText, ['WHR-CAL-CONTRACT-02', 'WHR-CP-PUB-29-36']]"
          new_start = "[paths.startHere, startHereText, ['WHR-CP-PUB-37-44', 'WHR-CAL-BACKFILL-01-20']]"
          if old_start not in calendar:
              raise SystemExit('Calendar START-HERE expectation target was not found')
          calendar = calendar.replace(old_start, new_start, 1)
          calendar_path.write_text(calendar, encoding='utf-8')
          PY
      - name: Remove all one-time workflow files
        run: |
          rm -f \
            .github/workflows/rendered-preview-qa-29-36.yml \
            .github/workflows/finalize-publication-29-36.yml \
            .github/workflows/trigger-finalize-publication-29-36.yml
      - name: Validate final state
        id: validate
        continue-on-error: true
        run: |
          set +e
          {
            node scripts/check-country-page-programme.mjs
            node scripts/check-country-page-programme-roadmap.mjs
            node scripts/check-project-governance-docs.mjs
            node scripts/check-calendar-contracts.mjs
          } > finalizer-validation.txt 2>&1
          status=$?
          cat finalizer-validation.txt
          exit $status
      - name: Preserve validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finalizer-validation-29-36
          path: finalizer-validation.txt
          if-no-files-found: error
          retention-days: 1
      - name: Stop on validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Commit final state
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '[CF-Pages-Skip] Finalize publication state for entries 29-36'
          git push origin HEAD:country-pages-29-36-publication-final
