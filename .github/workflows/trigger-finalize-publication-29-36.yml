name: Trigger publication finalizer 29-36

on:
  pull_request:
    paths:
      - '.github/workflows/trigger-finalize-publication-29-36.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-29-36-publication-final
          fetch-depth: 0
      - name: Diagnose reviewed one-time finalizer
        id: diagnose
        continue-on-error: true
        run: |
          python - <<'PY' > finalizer-diagnostic.txt 2>&1
          from pathlib import Path
          import textwrap
          import traceback

          try:
              workflow = Path('.github/workflows/finalize-publication-29-36.yml').read_text(encoding='utf-8')
              marker = "          python - <<'PY'\n"
              if marker not in workflow or '\n          PY\n' not in workflow:
                  raise RuntimeError('finalizer Python block was not found')
              block = workflow.split(marker, 1)[1].split('\n          PY\n', 1)[0]
              exec(textwrap.dedent(block), {'__name__': '__main__'})
          except BaseException:
              traceback.print_exc()
              raise
          PY
      - name: Preserve diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: finalizer-diagnostic-29-36
          path: finalizer-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail after diagnostic capture
        if: steps.diagnose.outcome == 'failure'
        run: exit 1
