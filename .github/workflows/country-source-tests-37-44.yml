name: Country source tests 37-44

on:
  pull_request:
    paths:
      - 'docs/timetable-source-tests/37-44-index.md'
      - 'docs/timetable-source-tests/37-44-sources.md'
      - 'docs/timetable-source-tests/37-*/**'
      - 'docs/timetable-source-tests/38-*/**'
      - 'docs/timetable-source-tests/39-*/**'
      - 'docs/timetable-source-tests/40-*/**'
      - 'docs/timetable-source-tests/41-*/**'
      - 'docs/timetable-source-tests/42-*/**'
      - 'docs/timetable-source-tests/43-*/**'
      - 'docs/timetable-source-tests/44-*/**'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-source-tests-37-44.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-source-tests-37-44.yml'
  push:
    branches: [main]
    paths:
      - 'docs/timetable-source-tests/37-44-index.md'
      - 'docs/timetable-source-tests/37-44-sources.md'
      - 'docs/timetable-source-tests/37-*/**'
      - 'docs/timetable-source-tests/38-*/**'
      - 'docs/timetable-source-tests/39-*/**'
      - 'docs/timetable-source-tests/40-*/**'
      - 'docs/timetable-source-tests/41-*/**'
      - 'docs/timetable-source-tests/42-*/**'
      - 'docs/timetable-source-tests/43-*/**'
      - 'docs/timetable-source-tests/44-*/**'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-source-tests-37-44.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-source-tests-37-44.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-source-tests-37-44.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
