name: Country source tests 29-36

on:
  pull_request:
    paths:
      - 'docs/timetable-source-tests/29-36-index.md'
      - 'docs/timetable-source-tests/29-36-sources.md'
      - 'docs/timetable-source-tests/29-*/**'
      - 'docs/timetable-source-tests/30-*/**'
      - 'docs/timetable-source-tests/31-*/**'
      - 'docs/timetable-source-tests/32-*/**'
      - 'docs/timetable-source-tests/33-*/**'
      - 'docs/timetable-source-tests/34-*/**'
      - 'docs/timetable-source-tests/35-*/**'
      - 'docs/timetable-source-tests/36-*/**'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-source-tests-29-36.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-source-tests-29-36.yml'
  push:
    branches: [main]
    paths:
      - 'docs/timetable-source-tests/29-36-index.md'
      - 'docs/timetable-source-tests/29-36-sources.md'
      - 'docs/timetable-source-tests/29-*/**'
      - 'docs/timetable-source-tests/30-*/**'
      - 'docs/timetable-source-tests/31-*/**'
      - 'docs/timetable-source-tests/32-*/**'
      - 'docs/timetable-source-tests/33-*/**'
      - 'docs/timetable-source-tests/34-*/**'
      - 'docs/timetable-source-tests/35-*/**'
      - 'docs/timetable-source-tests/36-*/**'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-source-tests-29-36.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-source-tests-29-36.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-source-tests-29-36.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
