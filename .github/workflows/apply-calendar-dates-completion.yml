name: Apply Calendar dates completion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-dates-complete
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply completion state
        run: node scripts/apply-calendar-dynamic-dates-completion.mjs
      - name: Validate release state
        run: |
          node scripts/check-calendar-dynamic-dates-release-gate.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-baseline-reconciliation.mjs
      - name: Build site
        run: |
          npm install --package-lock=false
          npm run build
      - name: Commit completion state
        run: |
          rm -f scripts/apply-calendar-dynamic-dates-completion.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Calendar Dynamic Dates"
          git push origin HEAD:calendar-dates-complete
