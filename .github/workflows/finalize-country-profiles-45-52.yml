name: Finalize country profiles 45-52

on:
  push:
    branches:
      - calendar-readiness-backfill-37-52
    paths:
      - 'scripts/apply-country-profiles-45-52.mjs'
      - '.github/workflows/finalize-country-profiles-45-52.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-37-52
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply tracker and governance transition
        run: node scripts/apply-country-profiles-45-52.mjs
      - name: Validate profiles and programme
        run: |
          node scripts/check-country-profiles-45-52.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-country-page-programme-roadmap.mjs
      - name: Validate production build
        run: |
          npm install
          npm run build
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'calendar-readiness-backfill-37-52';
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parent = ref.data.object.sha;
            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: parent });
            const files = [
              'START-HERE.md',
              'docs/project-roadmap.md',
              'docs/country-pages/programme-roadmap.md',
              'docs/country-pages/98-country-tracker.tsv',
              'scripts/check-calendar-contracts.mjs',
              'scripts/check-project-governance-docs.mjs',
              'scripts/check-country-page-programme-roadmap.mjs'
            ];
            const tree = [];
            for (const file of files) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(file).toString('base64'),
                encoding: 'base64'
              });
              tree.push({ path: file, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            tree.push({ path: 'scripts/apply-country-profiles-45-52.mjs', mode: '100644', type: 'blob', sha: null });
            tree.push({ path: '.github/workflows/finalize-country-profiles-45-52.yml', mode: '100644', type: 'blob', sha: null });
            const createdTree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parentCommit.data.tree.sha,
              tree
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: '[CF-Pages-Skip] Complete Country Profiles v2 45-52',
              tree: createdTree.data.sha,
              parents: [parent]
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${branch}`,
              sha: commit.data.sha,
              force: false
            });
            core.info(`updated ${branch} to ${commit.data.sha}`);
