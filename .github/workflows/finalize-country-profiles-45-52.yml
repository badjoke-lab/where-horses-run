name: Finalize country profiles 45-52

on:
  pull_request:
    paths:
      - 'scripts/apply-country-profiles-45-52.mjs'
      - '.github/workflows/finalize-country-profiles-45-52.yml'
  push:
    branches:
      - calendar-readiness-backfill-37-52
    paths:
      - 'scripts/apply-country-profiles-45-52.mjs'
      - '.github/workflows/finalize-country-profiles-45-52.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-37-52
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Separate organiser and distributor roles
        run: |
          node - <<'NODE'
          const fs = require('fs');
          for (const file of [
            'data/static/country-profiles-v2-45-norway.json',
            'data/static/country-profiles-v2-48-switzerland.json'
          ]) {
            const profiles = JSON.parse(fs.readFileSync(file, 'utf8'));
            for (const profile of profiles) {
              for (const system of profile.systems ?? []) {
                const organisers = new Set(system.organiser_source_ids ?? []);
                system.distributor_source_ids = (system.distributor_source_ids ?? []).filter((id) => !organisers.has(id));
              }
            }
            fs.writeFileSync(file, `${JSON.stringify(profiles)}\n`);
          }
          NODE
      - name: Apply tracker and governance transition
        run: node scripts/apply-country-profiles-45-52.mjs
      - name: Validate profiles 45-52
        run: node scripts/check-country-profiles-45-52.mjs
      - name: Validate country programme
        run: node scripts/check-country-page-programme.mjs
      - name: Validate profile runtime
        run: node scripts/check-country-detail-profile-runtime.mjs
      - name: Validate Calendar contracts
        run: node scripts/check-calendar-contracts.mjs
      - name: Validate governance
        run: node scripts/check-project-governance-docs.mjs
      - name: Validate programme roadmap
        run: node scripts/check-country-page-programme-roadmap.mjs
      - name: Install dependencies
        run: npm install
      - name: Validate production build
        run: npm run build
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'calendar-readiness-backfill-37-52';
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parent = ref.data.object.sha;
            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: parent });
            const files = [
              'START-HERE.md',
              'docs/project-roadmap.md',
              'docs/country-pages/programme-roadmap.md',
              'docs/country-pages/98-country-tracker.tsv',
              'data/static/country-profiles-v2-45-norway.json',
              'data/static/country-profiles-v2-48-switzerland.json',
              'scripts/check-calendar-contracts.mjs',
              'scripts/check-project-governance-docs.mjs',
              'scripts/check-country-page-programme-roadmap.mjs'
            ];
            const tree = [];
            for (const file of files) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(file).toString('base64'),
                encoding: 'base64'
              });
              tree.push({ path: file, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            tree.push({ path: 'scripts/apply-country-profiles-45-52.mjs', mode: '100644', type: 'blob', sha: null });
            tree.push({ path: '.github/workflows/finalize-country-profiles-45-52.yml', mode: '100644', type: 'blob', sha: null });
            const createdTree = await github.rest.git.createTree({ owner, repo, base_tree: parentCommit.data.tree.sha, tree });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: '[CF-Pages-Skip] Complete Country Profiles v2 45-52',
              tree: createdTree.data.sha,
              parents: [parent]
            });
            await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: commit.data.sha, force: false });
            core.info(`updated ${branch} to ${commit.data.sha}`);
