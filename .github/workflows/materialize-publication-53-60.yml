name: Materialize publication QA 53-60

on:
  pull_request:
    paths:
      - 'scripts/materialize-publication-53-60.mjs'
      - '.github/workflows/materialize-publication-53-60.yml'
  push:
    branches: [country-publish-53-60]
    paths:
      - 'scripts/materialize-publication-53-60.mjs'
      - '.github/workflows/materialize-publication-53-60.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-publish-53-60
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply publication QA state
        run: node scripts/materialize-publication-53-60.mjs
      - name: Build production output
        run: |
          npm install
          npm run build
      - name: Validate publication routes
        run: node scripts/check-country-page-publication-53-60.mjs
      - name: Validate profiles
        run: node scripts/check-country-profiles-53-60.mjs
      - name: Validate profile runtime
        run: node scripts/check-country-detail-profile-runtime.mjs
      - name: Validate country programme
        run: node scripts/check-country-page-programme.mjs
      - name: Validate programme roadmap
        run: node scripts/check-country-page-programme-roadmap.mjs
      - name: Validate governance
        run: node scripts/check-project-governance-docs.mjs
      - name: Validate Calendar contracts
        run: node scripts/check-calendar-contracts.mjs
      - name: Commit publication QA state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/project-roadmap.md docs/country-pages/programme-roadmap.md docs/country-pages/98-country-tracker.tsv scripts/check-country-page-publication-53-60.mjs scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs
          if ! git diff --cached --quiet; then
            git commit -m '[CF-Pages-Skip] Enter publication QA for entries 53-60'
            git push origin HEAD:country-publish-53-60
          fi
