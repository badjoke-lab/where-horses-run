name: Apply JRA pilot diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-jra-pilot-foundation
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-jra-doc-index.mjs
      - run: node scripts/timetable/build-jra-pilot-review.mjs
      - name: Validate
        run: |
          set +e
          node scripts/check-jra-pilot-foundation.mjs > /tmp/jra-pilot-foundation.log 2>&1
          status=$?
          cat /tmp/jra-pilot-foundation.log
          exit $status
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jra-pilot-foundation-diagnostic
          path: /tmp/jra-pilot-foundation.log
          retention-days: 30
