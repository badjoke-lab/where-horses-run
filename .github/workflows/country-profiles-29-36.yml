name: Country profiles 29-36

on:
  pull_request:
    paths:
      - 'data/static/country-page-countries-29-36.json'
      - 'data/static/country-page-sources-29-36.json'
      - 'data/static/country-profiles-v2-29-*.json'
      - 'data/static/country-profiles-v2-30-*.json'
      - 'data/static/country-profiles-v2-31-*.json'
      - 'data/static/country-profiles-v2-32-*.json'
      - 'data/static/country-profiles-v2-33-*.json'
      - 'data/static/country-profiles-v2-34-*.json'
      - 'data/static/country-profiles-v2-35-*.json'
      - 'data/static/country-profiles-v2-36-*.json'
      - 'docs/country-pages/**'
      - 'docs/runbooks/pr-303.md'
      - 'src/lib/data.ts'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-profiles-29-36.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-profiles-29-36.yml'
  push:
    branches: [main]
    paths:
      - 'data/static/country-page-countries-29-36.json'
      - 'data/static/country-page-sources-29-36.json'
      - 'data/static/country-profiles-v2-29-*.json'
      - 'data/static/country-profiles-v2-30-*.json'
      - 'data/static/country-profiles-v2-31-*.json'
      - 'data/static/country-profiles-v2-32-*.json'
      - 'data/static/country-profiles-v2-33-*.json'
      - 'data/static/country-profiles-v2-34-*.json'
      - 'data/static/country-profiles-v2-35-*.json'
      - 'data/static/country-profiles-v2-36-*.json'
      - 'docs/country-pages/**'
      - 'docs/runbooks/pr-303.md'
      - 'src/lib/data.ts'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-profiles-29-36.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-profiles-29-36.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-profiles-29-36.mjs
      - run: node scripts/check-country-detail-profile-runtime.mjs
      - run: node scripts/check-country-notes-29-36.mjs
      - run: node scripts/check-country-source-tests-29-36.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
