name: Apply local racing current state

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-nar-link-only-pilot
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply current-state updates
        run: node scripts/apply-local-racing-current-state.mjs
      - name: Regenerate review baseline
        run: node scripts/timetable/build-local-racing-pilot-review.mjs
      - name: Validate current state
        run: |
          node scripts/check-local-racing-pilot-foundation.mjs
          node scripts/check-japan-nar-candidate-generator.mjs
          node scripts/check-calendar-baseline-reconciliation.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-calendar-pipeline-v1-release-gate.mjs
          node scripts/check-calendar-dynamic-dates-release-gate.mjs
          node scripts/check-calendar-operations-v1-release-gate.mjs
      - name: Commit validated state and remove temporary helpers
        run: |
          rm -f scripts/apply-local-racing-current-state.mjs
          rm -f scripts/apply-local-racing-pilot-index.mjs
          rm -f .github/workflows/apply-local-racing-pilot-index.yml
          rm -f .github/workflows/local-racing-pilot-diagnostic.yml
          rm -f .github/workflows/export-local-racing-branch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete local racing link-only foundation"
          git push origin HEAD:calendar-nar-link-only-pilot
