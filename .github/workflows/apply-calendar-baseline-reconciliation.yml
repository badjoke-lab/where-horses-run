name: Apply Calendar baseline reconciliation

on:
  push:
    branches:
      - calendar-baseline-reconcile
    paths:
      - 'scripts/apply-calendar-baseline-reconciliation.mjs'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-baseline-reconcile
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply reconciliation updates
        run: node scripts/apply-calendar-baseline-reconciliation.mjs
      - name: Validate reconciliation
        run: |
          node scripts/check-calendar-baseline-reconciliation.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
      - name: Commit reconciled baseline
        run: |
          rm -f scripts/apply-calendar-baseline-reconciliation.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[CF-Pages-Skip] Complete Calendar baseline reconciliation"
          git push origin HEAD:calendar-baseline-reconcile
