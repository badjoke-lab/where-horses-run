name: Calendar readiness backfill 01-52

on:
  pull_request:
    paths:
      - 'START-HERE.md'
      - 'docs/project-roadmap.md'
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/runbooks/calendar-readiness-backfill-37-52.md'
      - 'data/static/authority-source-inventory.json'
      - 'data/static/calendar-readiness-registry.json'
      - '.tmp/calendar-readiness-authority-additions-37-52.zlib.b64'
      - '.tmp/calendar-readiness-record-additions-37-52.zlib.b64'
      - 'scripts/materialize-calendar-backfill-data.mjs'
      - 'scripts/check-calendar-readiness-backfill-01-20.mjs'
      - 'scripts/check-calendar-readiness-backfill-21-36.mjs'
      - 'scripts/check-calendar-readiness-backfill-37-52.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/calendar-readiness-backfill-01-52.yml'
  push:
    branches:
      - main
    paths:
      - 'START-HERE.md'
      - 'docs/project-roadmap.md'
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/runbooks/calendar-readiness-backfill-37-52.md'
      - 'data/static/authority-source-inventory.json'
      - 'data/static/calendar-readiness-registry.json'
      - 'scripts/check-calendar-readiness-backfill-01-20.mjs'
      - 'scripts/check-calendar-readiness-backfill-21-36.mjs'
      - 'scripts/check-calendar-readiness-backfill-37-52.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/calendar-readiness-backfill-01-52.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/materialize-calendar-backfill-data.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: node scripts/check-calendar-readiness-backfill-01-20.mjs
      - run: node scripts/check-calendar-readiness-backfill-21-36.mjs
      - run: node scripts/check-calendar-readiness-backfill-37-52.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: npm install
      - run: npm run build
      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parent = context.payload.pull_request.head.sha;
            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: parent });
            const files = [
              'data/static/authority-source-inventory.json',
              'data/static/calendar-readiness-registry.json'
            ];
            const tree = [];
            const result = { parent };
            for (const file of files) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(file).toString('base64'),
                encoding: 'base64'
              });
              tree.push({ path: file, mode: '100644', type: 'blob', sha: blob.data.sha });
              result[file] = blob.data.sha;
            }
            const createdTree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parentCommit.data.tree.sha,
              tree
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: '[CF-Pages-Skip] Finalize Calendar Readiness data 37-52',
              tree: createdTree.data.sha,
              parents: [parent]
            });
            result.tree = createdTree.data.sha;
            result.commit = commit.data.sha;
            core.info(`prepared commit ${commit.data.sha}`);
            fs.writeFileSync('calendar-backfill-commit.json', JSON.stringify(result, null, 2));
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: calendar-backfill-commit
          path: calendar-backfill-commit.json
          if-no-files-found: error
          retention-days: 1
