name: Finalize Calendar readiness backfill 21-36

on:
  pull_request:
    paths:
      - '.github/workflows/finalize-calendar-readiness-backfill-21-36.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-21-36
          fetch-depth: 0
      - name: Apply reviewed backfill in temporary worktree
        id: apply
        continue-on-error: true
        run: python scripts/finalize-calendar-readiness-backfill-21-36.py > finalizer-diagnostic.txt 2>&1
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calendar-readiness-finalizer-diagnostic-21-36
          path: finalizer-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
      - name: Stop after diagnostic
        if: steps.apply.outcome == 'failure'
        run: exit 1
