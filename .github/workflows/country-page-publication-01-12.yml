name: Country page publication 01-12

on:
  pull_request:
    paths:
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'src/styles/components.css'
      - 'scripts/check-country-page-publication-01-12.mjs'
      - '.github/workflows/country-page-publication-01-12.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'src/styles/components.css'
      - 'scripts/check-country-page-publication-01-12.mjs'
      - '.github/workflows/country-page-publication-01-12.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm install
      - run: node scripts/check-country-page-publication-01-12.mjs
      - run: npm run build
