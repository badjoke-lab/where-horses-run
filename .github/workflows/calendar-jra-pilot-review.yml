name: Calendar JRA pilot review

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Build review-only JRA pilot artifact
        run: node scripts/timetable/build-jra-pilot-review.mjs --output /tmp/jra-pilot-review.json
      - uses: actions/upload-artifact@v4
        with:
          name: calendar-jra-pilot-review
          path: /tmp/jra-pilot-review.json
          if-no-files-found: error
          retention-days: 30
