name: Apply Calendar operations status

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-ops-status
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/timetable/build-operations-status.mjs --reference-date 2026-07-01
      - name: Validate baseline
        run: |
          set +e
          node scripts/check-calendar-operations-status.mjs > /tmp/calendar-operations-status.log 2>&1
          status=$?
          cat /tmp/calendar-operations-status.log
          exit $status
      - name: Upload validation diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: calendar-operations-status-diagnostic
          path: /tmp/calendar-operations-status.log
          if-no-files-found: error
          retention-days: 30
      - name: Commit baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/timetable/operations-status.json
          git commit -m "Generate Calendar operations status baseline"
          git push origin HEAD:calendar-ops-status
