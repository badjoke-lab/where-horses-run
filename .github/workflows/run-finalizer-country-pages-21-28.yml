name: Run finalizer for country pages 21-28

on:
  pull_request:
    paths:
      - '.github/workflows/run-finalizer-country-pages-21-28.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-21-28-publication-final
          fetch-depth: 0

      - name: Extract and run approved finalizer
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          source = Path('.github/workflows/finalize-country-pages-21-28.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply approved publication state and roadmap renumbering\n        shell: python\n        run: |\n'
          end_marker = '\n      - name: Validate finalized publication state\n'
          if marker not in source or end_marker not in source:
              raise SystemExit('finalizer block markers not found')
          block = source.split(marker, 1)[1].split(end_marker, 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines()) + '\n'
          Path('/tmp/finalize-country-pages-21-28.py').write_text(script, encoding='utf-8')
          subprocess.run(['python', '/tmp/finalize-country-pages-21-28.py'], check=True)

      - name: Validate finalized publication state
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm run build
          node scripts/check-country-page-publication-21-28.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs

      - name: Commit finalized publication state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md docs/runbooks/country-pages-21-28-publication-final.md scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs
          git commit -m '[CF-Pages-Skip] Finalize publication records for country pages 21-28'
          git push origin HEAD:country-pages-21-28-publication-final
