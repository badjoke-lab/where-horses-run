name: Finalize country notes 53-60

on:
  pull_request:
    paths:
      - 'scripts/finalize-country-notes-53-60.mjs'
      - '.github/workflows/finalize-country-notes-53-60.yml'
  push:
    branches: [country-notes-53-60]
    paths:
      - 'scripts/finalize-country-notes-53-60.mjs'
      - '.github/workflows/finalize-country-notes-53-60.yml'

permissions:
  contents: write

concurrency:
  group: finalize-country-notes-53-60
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-notes-53-60
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/finalize-country-notes-53-60.mjs
      - run: |
          node scripts/check-country-notes-53-60.mjs
          node scripts/check-source-test-v2-53-60.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - run: |
          npm install
          npm run build
      - name: Commit finalized note state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START-HERE.md docs/project-roadmap.md docs/country-pages/programme-roadmap.md docs/country-pages/98-country-tracker.tsv docs/runbooks/country-notes-53-60.md scripts/check-country-page-programme.mjs scripts/check-calendar-contracts.mjs scripts/check-project-governance-docs.mjs scripts/check-country-page-programme-roadmap.mjs
          if ! git diff --cached --quiet; then
            git commit -m '[CF-Pages-Skip] Finalize reviewed notes 53-60'
            git push origin HEAD:country-notes-53-60
          fi
