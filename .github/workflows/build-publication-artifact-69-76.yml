name: Build publication artifact 69-76

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/build-publication-69-76.cjs'
      - '.github/workflows/build-publication-artifact-69-76.yml'

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Transform publication files
        run: node scripts/build-publication-69-76.cjs
      - name: Validate publication output
        run: |
          npm install
          npm run build
          node scripts/check-country-page-publication-69-76.mjs
          node scripts/check-country-profiles-69-76.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - name: Collect changed files
        run: |
          mkdir -p /tmp/publication-output
          { git diff --name-only; git ls-files --others --exclude-standard; } | sort -u | while read file; do
            case "$file" in
              scripts/build-publication-69-76.cjs|.github/workflows/build-publication-artifact-69-76.yml) continue ;;
            esac
            mkdir -p "/tmp/publication-output/$(dirname "$file")"
            cp "$file" "/tmp/publication-output/$file"
          done
          find /tmp/publication-output -type f | sort > /tmp/publication-output/FILELIST.txt
      - uses: actions/upload-artifact@v4
        with:
          name: publication-output-69-76
          path: /tmp/publication-output
          if-no-files-found: error
          retention-days: 30
