name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and publication QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate country pages 01-12
        run: node scripts/check-country-page-publication-01-12.mjs

      - name: Validate country pages 13-20
        run: node scripts/check-country-page-publication-13-20.mjs

      - name: Validate country pages 21-28 before preview
        run: node scripts/check-country-page-publication-21-28.mjs
