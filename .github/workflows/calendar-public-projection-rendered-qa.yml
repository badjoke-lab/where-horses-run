name: Calendar public projection rendered QA

on:
  pull_request:
    paths:
      - 'data/audits/calendar-public-projection-release-v1.json'
      - 'data/generated/timetable/public/**'
      - 'scripts/check-calendar-public-projection-rendered-qa.mjs'
      - '.github/workflows/calendar-public-projection-rendered-qa.yml'
  push:
    branches:
      - main
    paths:
      - 'data/audits/calendar-public-projection-release-v1.json'
      - 'data/generated/timetable/public/**'
      - 'scripts/check-calendar-public-projection-rendered-qa.mjs'
      - '.github/workflows/calendar-public-projection-rendered-qa.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rendered-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Build preview
        run: |
          npm install --package-lock=false
          npm run build
      - name: Validate rendered Calendar surfaces
        run: node scripts/check-calendar-public-projection-rendered-qa.mjs
      - name: Package rendered preview
        run: tar -czf /tmp/calendar-public-projection-preview-dist.tgz dist
      - uses: actions/upload-artifact@v4
        with:
          name: calendar-public-projection-preview-dist
          path: /tmp/calendar-public-projection-preview-dist.tgz
          if-no-files-found: error
          retention-days: 30
