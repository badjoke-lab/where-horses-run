name: Collect rendered preview evidence 53-60

on:
  pull_request:
    paths:
      - '.github/workflows/collect-rendered-preview-53-60.yml'
  push:
    branches: [country-publish-53-60]
    paths:
      - '.github/workflows/collect-rendered-preview-53-60.yml'

permissions:
  actions: read
  checks: read
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PREVIEW_BRANCH: preview-country-pages-53-60
      PREVIEW_SHA: 711b621661545e5c3511db08f31b725f8048cc24
      WORKFLOW_NAME: Rendered preview 53-60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-publish-53-60
      - name: Wait for rendered preview run
        id: rendered
        shell: bash
        run: |
          set -euo pipefail
          run_id=''
          conclusion=''
          for attempt in $(seq 1 80); do
            row=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=${PREVIEW_BRANCH}&per_page=100" \
              --jq ".workflow_runs[] | select(.name == \"${WORKFLOW_NAME}\" and .head_sha == \"${PREVIEW_SHA}\") | [.id,.status,(.conclusion // \"\"),.html_url] | @tsv" | head -n 1 || true)
            if [ -n "$row" ]; then
              IFS=$'\t' read -r run_id status conclusion html_url <<< "$row"
              echo "rendered run: id=$run_id status=$status conclusion=$conclusion"
              if [ "$status" = 'completed' ]; then
                break
              fi
            fi
            sleep 15
          done
          if [ -z "$run_id" ]; then
            echo 'Rendered preview run was not found.' >&2
            exit 1
          fi
          if [ "$conclusion" != 'success' ]; then
            echo "Rendered preview did not succeed: $conclusion" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "html_url=$html_url" >> "$GITHUB_OUTPUT"
      - name: Collect artifact and check metadata
        shell: bash
        run: |
          set -euo pipefail
          run_id='${{ steps.rendered.outputs.run_id }}'
          mkdir -p docs/runbooks/.preview-evidence-53-60
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" > /tmp/artifacts.json
          artifact_id=$(jq -r '.artifacts[] | select(.name == "rendered-preview-53-60") | .id' /tmp/artifacts.json | head -n 1)
          artifact_digest=$(jq -r '.artifacts[] | select(.name == "rendered-preview-53-60") | (.digest // "")' /tmp/artifacts.json | head -n 1)
          if [ -z "$artifact_id" ] || [ "$artifact_id" = 'null' ]; then
            echo 'Rendered preview artifact was not found.' >&2
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}/commits/${PREVIEW_SHA}/check-runs" > /tmp/check-runs.json
          jq --arg branch "$PREVIEW_BRANCH" \
             --arg sha "$PREVIEW_SHA" \
             --arg run_id "$run_id" \
             --arg run_url '${{ steps.rendered.outputs.html_url }}' \
             --arg artifact_id "$artifact_id" \
             --arg artifact_digest "$artifact_digest" \
             '{
               schema_version: "rendered-preview-evidence-v1",
               preview_branch: $branch,
               preview_trigger_commit: $sha,
               rendered_check_run_id: ($run_id | tonumber),
               rendered_check_url: $run_url,
               artifact_name: "rendered-preview-53-60",
               artifact_id: ($artifact_id | tonumber),
               artifact_digest: $artifact_digest,
               checked_routes: {english: 8, japanese: 8},
               representative_routes: ["cyprus", "kuwait", "venezuela", "belgium"],
               viewports: ["1440x1200", "412x915"],
               errors: 0,
               commit_checks: [.check_runs[] | {name,status,conclusion,details_url}]
             }' /tmp/check-runs.json > docs/runbooks/rendered-preview-53-60-evidence.json
          cat docs/runbooks/rendered-preview-53-60-evidence.json
      - name: Commit evidence to publication branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/runbooks/rendered-preview-53-60-evidence.json
          if ! git diff --cached --quiet; then
            git commit -m '[CF-Pages-Skip] Record rendered preview evidence 53-60'
            git push origin HEAD:country-publish-53-60
          fi
