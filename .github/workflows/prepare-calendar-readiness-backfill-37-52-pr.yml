name: Prepare Calendar readiness backfill 37-52 PR

on:
  pull_request:
    paths:
      - 'scripts/apply-calendar-readiness-backfill-37-52.mjs'
      - '.github/workflows/prepare-calendar-readiness-backfill-37-52-pr.yml'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-calendar-readiness-backfill-37-52.mjs
      - run: |
          node scripts/check-calendar-contracts.mjs
          node scripts/check-calendar-readiness-backfill-01-20.mjs
          node scripts/check-calendar-readiness-backfill-21-36.mjs
          node scripts/check-calendar-readiness-backfill-37-52.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-country-page-programme-roadmap.mjs
      - run: |
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: finalized-calendar-readiness-backfill-37-52-pr
          path: |
            data/static/authority-source-inventory.json
            data/static/calendar-readiness-registry.json
            START-HERE.md
            docs/project-roadmap.md
            docs/country-pages/programme-roadmap.md
            docs/runbooks/calendar-readiness-backfill-37-52.md
            scripts/check-calendar-contracts.mjs
            scripts/check-project-governance-docs.mjs
            scripts/check-country-page-programme-roadmap.mjs
          if-no-files-found: error
          retention-days: 1
