name: Diagnose Calendar readiness finalizer 01-20

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-calendar-readiness-finalizer-01-20.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-01-20
      - run: python scripts/finalize-calendar-readiness-backfill-01-20.py
      - name: Run validators
        run: |
          set +e
          node scripts/check-calendar-contracts.mjs > finalizer-validation.txt 2>&1
          node scripts/check-calendar-readiness-backfill-01-20.mjs >> finalizer-validation.txt 2>&1
          node scripts/check-project-governance-docs.mjs >> finalizer-validation.txt 2>&1
          node scripts/check-country-page-programme-roadmap.mjs >> finalizer-validation.txt 2>&1
          cat finalizer-validation.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: calendar-readiness-finalizer-validation-01-20
          path: finalizer-validation.txt
          retention-days: 1
