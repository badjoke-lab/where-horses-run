name: Rendered preview 45-52

on:
  push:
    branches:
      - preview-country-pages-45-52

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm install
      - run: npm install --no-save playwright@1.53.1
      - run: npx playwright install --with-deps chromium
      - name: Write preview checker
        env:
          CHECKER_B64: 
        run: echo "$CHECKER_B64" | base64 -d > /tmp/check-rendered-preview-45-52.mjs
      - name: Validate rendered preview
        env:
          BASE_URL: https://preview-country-pages-45-52.where-horses-run.pages.dev
        run: node /tmp/check-rendered-preview-45-52.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: rendered-preview-45-52
          path: artifacts/rendered-preview-45-52
          if-no-files-found: error
          retention-days: 7
