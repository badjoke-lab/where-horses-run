name: Rendered preview 77-84

on:
  push:
    branches: [preview-country-pages-77-84]
  pull_request:
    branches: [main]
    paths:
      - 'data/static/country-page-countries-77-84.json'
      - 'data/static/country-page-sources-77-84.json'
      - 'data/static/country-profiles-v2-7*.json'
      - 'data/static/country-profiles-v2-8*.json'
      - 'src/**'
      - 'scripts/rendered-preview-77-84.mjs'
      - '.github/workflows/rendered-preview-77-84.yml'
      - 'docs/runbooks/preview-trigger-77-84.md'

permissions:
  contents: read

env:
  NODE_VERSION: 22.12.0

jobs:
  rendered-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install project and browser
        run: |
          npm install
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Build site
        run: npm run build
      - name: Start local production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/whr-preview.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:4321/countries/kazakhstan/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/whr-preview.log
          exit 1
      - name: Run rendered route checks
        run: node scripts/rendered-preview-77-84.mjs
      - name: Upload rendered evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-preview-77-84
          path: artifacts/rendered-preview-77-84
          if-no-files-found: error
          retention-days: 90
