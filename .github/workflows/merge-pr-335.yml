name: Finalize PR 335

on:
  push:
    branches: [source-test-v2-69-76-clean]
    paths: ['.github/workflows/merge-pr-335.yml']

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76-clean
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-source-test-v2-69-76.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
      - name: Remove helper and merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm .github/workflows/merge-pr-335.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/merge-pr-335.yml
          git commit -m "[CF-Pages-Skip] Remove PR merge helper"
          git push origin HEAD:source-test-v2-69-76-clean
          sha=$(git rev-parse HEAD)
          gh api --method PUT repos/badjoke-lab/where-horses-run/pulls/335/merge \
            -f merge_method=squash \
            -f sha="$sha" \
            -f commit_title='[CF-Pages-Skip] Complete Source Test v2 for entries 69-76'
