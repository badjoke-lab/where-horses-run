name: Advance Calendar checks on clean branch

on:
  push:
    branches: [source-test-v2-69-76-clean]
    paths:
      - '.github/workflows/advance-calendar-clean.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76-clean
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Update Calendar validator
        run: |
          sed -i 's/Current Work ID: `WHR-ST2-69-76`/Current Work ID: `WHR-NOTE-69-76`/g' scripts/check-calendar-contracts.mjs
          sed -i 's/Next Work ID: `WHR-NOTE-69-76`/Next Work ID: `WHR-PROFILE-69-76`/g' scripts/check-calendar-contracts.mjs
          sed -i 's/CURRENT_WORK_ID: WHR-ST2-69-76/CURRENT_WORK_ID: WHR-NOTE-69-76/g' scripts/check-calendar-contracts.mjs
          sed -i 's/NEXT_WORK_ID: WHR-NOTE-69-76/NEXT_WORK_ID: WHR-PROFILE-69-76/g' scripts/check-calendar-contracts.mjs
          node scripts/check-calendar-contracts.mjs
          rm .github/workflows/advance-calendar-clean.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/check-calendar-contracts.mjs .github/workflows/advance-calendar-clean.yml
          git commit -m "[CF-Pages-Skip] Advance Calendar Work IDs"
          git push origin HEAD:source-test-v2-69-76-clean
