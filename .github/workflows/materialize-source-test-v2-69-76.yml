name: Materialize Source Test v2 69-76

on:
  push:
    branches: [source-test-v2-69-76]
    paths:
      - 'scripts/materialize-source-test-v2-69-76.mjs'
      - 'scripts/advance-source-test-v2-69-76-docs.mjs'
      - 'scripts/source-test-v2-69-76-materialization.json'
      - '.github/workflows/materialize-source-test-v2-69-76.yml'

concurrency:
  group: materialize-source-test-v2-69-76
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/materialize-source-test-v2-69-76.mjs
      - run: node scripts/advance-source-test-v2-69-76-docs.mjs
      - name: Commit generated state and remove one-time tools
        run: |
          rm scripts/materialize-source-test-v2-69-76.mjs
          rm scripts/advance-source-test-v2-69-76-docs.mjs
          rm scripts/source-test-v2-69-76-materialization.json
          rm .github/workflows/materialize-source-test-v2-69-76.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "[CF-Pages-Skip] Materialize Source Test v2 69-76"
          git push origin HEAD:source-test-v2-69-76
