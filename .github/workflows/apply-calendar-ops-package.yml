name: Apply Calendar operations package

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-ops-package
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-calendar-operations-review-package.mjs
      - run: node scripts/timetable/build-operations-review-package.mjs
      - run: node scripts/check-calendar-operations-review-package.mjs
      - name: Commit review package
        run: |
          rm -f scripts/apply-calendar-operations-review-package.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate Calendar operations review package"
          git push origin HEAD:calendar-ops-package
