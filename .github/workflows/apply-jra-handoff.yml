name: Apply JRA handoff

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: jra-candidate-handoff
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/apply-jra-final-handoff-index.mjs
      - run: node scripts/check-jra-final-normalized-handoff.mjs
      - run: |
          rm -f scripts/apply-jra-final-handoff-index.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/calendar/README.md docs/governance/document-authority.md
          git add -u scripts/apply-jra-final-handoff-index.mjs
          git commit -m "Index JRA final handoff"
          git push origin HEAD:jra-candidate-handoff
