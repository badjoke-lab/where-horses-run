name: One-shot profile tracker 37-44

on:
  push:
    branches: [country-profiles-37-44]

permissions:
  contents: write

jobs:
  update:
    if: ${{ !contains(github.event.head_commit.message, '[tracker-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-profiles-37-44
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/advance-country-profile-tracker-37-44.mjs
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/country-pages/98-country-tracker.tsv
          git diff --cached --quiet && exit 0
          git commit -m '[CF-Pages-Skip] Advance entries 37-44 to profile ready [tracker-sync]'
          git push
