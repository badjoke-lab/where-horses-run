name: Materialize country profiles 53-60

on:
  pull_request:
    paths:
      - 'scripts/materialize-country-profiles-53-60.mjs'
      - '.github/workflows/materialize-country-profiles-53-60.yml'
  push:
    branches: [country-profiles-53-60]
    paths:
      - 'scripts/materialize-country-profiles-53-60.mjs'
      - '.github/workflows/materialize-country-profiles-53-60.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-profiles-53-60
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply profile state
        run: node scripts/materialize-country-profiles-53-60.mjs
      - name: Validate profile state
        run: |
          node scripts/check-country-profiles-53-60.mjs
          node scripts/check-country-notes-53-60.mjs
          node scripts/check-source-test-v2-53-60.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-country-page-programme-roadmap.mjs
      - name: Validate production build
        run: |
          npm install
          npm run build
      - name: Commit materialized profile state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/lib/data.ts START-HERE.md docs/project-roadmap.md docs/country-pages/programme-roadmap.md docs/country-pages/98-country-tracker.tsv docs/runbooks/country-profiles-53-60.md scripts/check-country-page-programme.mjs scripts/check-calendar-contracts.mjs scripts/check-project-governance-docs.mjs scripts/check-country-page-programme-roadmap.mjs
          if ! git diff --cached --quiet; then
            git commit -m '[CF-Pages-Skip] Finalize country profiles 53-60'
            git push origin HEAD:country-profiles-53-60
          fi
