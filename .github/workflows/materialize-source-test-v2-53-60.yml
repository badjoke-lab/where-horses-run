name: Materialize Source Test v2 53-60

on:
  pull_request:
    paths:
      - 'scripts/materialize-source-test-v2-53-60.mjs'
      - '.github/workflows/materialize-source-test-v2-53-60.yml'
  push:
    branches:
      - source-test-v2-53-60
    paths:
      - 'scripts/materialize-source-test-v2-53-60.mjs'
      - '.github/workflows/materialize-source-test-v2-53-60.yml'

permissions:
  contents: write

concurrency:
  group: materialize-source-test-v2-53-60
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-53-60
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Materialize canonical records
        run: node scripts/materialize-source-test-v2-53-60.mjs
      - name: Validate wave records
        run: node scripts/check-source-test-v2-53-60.mjs
      - name: Commit canonical records
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            data/static/authority-source-inventory.json \
            data/static/calendar-readiness-registry.json \
            docs/country-pages/98-country-tracker.tsv
          git commit -m '[CF-Pages-Skip] Materialize Source Test v2 records 53-60'
          git push origin HEAD:source-test-v2-53-60
