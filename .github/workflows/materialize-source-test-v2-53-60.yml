name: Source Test v2 53-60

on:
  pull_request:
    paths:
      - 'scripts/materialize-source-test-v2-53-60.mjs'
      - 'scripts/advance-after-source-test-v2-53-60.mjs'
      - '.github/workflows/materialize-source-test-v2-53-60.yml'
  push:
    branches: [source-test-v2-53-60]
    paths:
      - 'scripts/materialize-source-test-v2-53-60.mjs'
      - 'scripts/advance-after-source-test-v2-53-60.mjs'
      - '.github/workflows/materialize-source-test-v2-53-60.yml'

permissions:
  contents: write

concurrency:
  group: source-test-v2-53-60
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-53-60
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/materialize-source-test-v2-53-60.mjs
      - run: node scripts/advance-after-source-test-v2-53-60.mjs
      - run: |
          node scripts/check-source-test-v2-53-60.mjs
          node scripts/check-calendar-contracts.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-country-page-programme-roadmap.mjs
      - run: |
          npm install
          npm run build
      - name: Save generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START-HERE.md data/static/authority-source-inventory.json data/static/calendar-readiness-registry.json docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md docs/project-roadmap.md docs/runbooks/source-test-v2-53-60.md scripts/check-calendar-contracts.mjs scripts/check-country-page-programme.mjs scripts/check-project-governance-docs.mjs scripts/check-country-page-programme-roadmap.mjs
          if ! git diff --cached --quiet; then
            git commit -m 'Update Source Test v2 records 53-60'
            git push origin HEAD:source-test-v2-53-60
          fi
