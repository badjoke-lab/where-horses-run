name: JRA review package diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: jra-review-package-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Run validator
        run: |
          set +e
          node scripts/check-jra-review-package.mjs > /tmp/jra-review-package.log 2>&1
          status=$?
          cat /tmp/jra-review-package.log
          exit $status
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jra-review-package-diagnostic
          path: /tmp/jra-review-package.log
          retention-days: 30
