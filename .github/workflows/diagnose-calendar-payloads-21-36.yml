name: Diagnose Calendar payloads 21-36

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-calendar-payloads-21-36.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-readiness-backfill-21-36
      - run: |
          sha256sum .tmp/calendar-readiness-authority-21-36.part* > payload-hashes.txt
          wc -c .tmp/calendar-readiness-authority-21-36.part* >> payload-hashes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: calendar-payload-part-hashes-21-36
          path: payload-hashes.txt
          retention-days: 1
