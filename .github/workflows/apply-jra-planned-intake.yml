name: Apply JRA planned intake

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-jra-planned-intake
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/timetable/build-jra-planned-program-intake.mjs
      - run: node scripts/timetable/build-jra-planned-program-review.mjs
      - run: node scripts/check-jra-planned-intake.mjs
      - name: Commit reviewed intake artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/timetable/jra-planned-program-intake.json
          git add data/generated/timetable/jra-planned-program-review.json
          git commit -m "Generate JRA planned-program intake"
          git push origin HEAD:calendar-jra-planned-intake
