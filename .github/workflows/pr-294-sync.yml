name: PR 294 tracker synchronization

on:
  push:
    branches: [country-notes-13-20]
    paths: ['.github/workflows/pr-294-sync.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-notes-13-20
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/pr-294-sync.mjs
      - name: Commit tracker
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv
          git commit -m 'Synchronize reviewed note states 13-20'
          git push origin HEAD:country-notes-13-20
