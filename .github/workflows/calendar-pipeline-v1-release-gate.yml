name: Calendar pipeline v1 release gate

on:
  pull_request:
    paths:
      - 'START-HERE.md'
      - 'data/audits/calendar-pipeline-v1-release-gate.json'
      - 'data/candidates/japan-jra-candidates.json'
      - 'data/generated/timetable/**'
      - 'data/static/**'
      - 'docs/calendar/**'
      - 'docs/project-roadmap.md'
      - 'scripts/check-calendar-*.mjs'
      - 'scripts/check-japan-jra-candidate-generator.mjs'
      - 'scripts/timetable/**'
      - 'src/**'
      - '.github/workflows/calendar-pipeline-v1-release-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'START-HERE.md'
      - 'data/audits/calendar-pipeline-v1-release-gate.json'
      - 'data/candidates/japan-jra-candidates.json'
      - 'data/generated/timetable/**'
      - 'data/static/**'
      - 'docs/calendar/**'
      - 'docs/project-roadmap.md'
      - 'scripts/check-calendar-*.mjs'
      - 'scripts/check-japan-jra-candidate-generator.mjs'
      - 'scripts/timetable/**'
      - 'src/**'
      - '.github/workflows/calendar-pipeline-v1-release-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Run grouped Pipeline v1 validation
        run: node scripts/check-calendar-pipeline-v1-release-gate.mjs
      - name: Install dependencies without lockfile mutation
        run: npm install --package-lock=false
      - name: Build static site
        run: npm run build
      - name: Validate rendered public release
        run: node scripts/check-calendar-public-projection-rendered-qa.mjs
      - name: Validate Calendar contracts and governance
        run: |
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-baseline-reconciliation.mjs
      - name: Prove release-gate run leaves repository clean
        run: |
          changes="$(git status --porcelain --untracked-files=all)"
          if [ -n "$changes" ]; then
            printf '%s\n' "$changes"
            echo 'Pipeline v1 release gate modified repository files.' >&2
            exit 1
          fi
