name: Country notes 53-60

on:
  pull_request:
    paths:
      - 'docs/country-page-notes/5*.md'
      - 'docs/country-page-notes/60-belgium.md'
      - 'docs/country-pages/**'
      - 'docs/project-roadmap.md'
      - 'START-HERE.md'
      - 'scripts/check-country-notes-53-60.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - '.github/workflows/country-notes-53-60.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-page-notes/5*.md'
      - 'docs/country-page-notes/60-belgium.md'
      - 'docs/country-pages/**'
      - 'docs/project-roadmap.md'
      - 'START-HERE.md'
      - 'scripts/check-country-notes-53-60.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - '.github/workflows/country-notes-53-60.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-notes-53-60.mjs
      - run: node scripts/check-source-test-v2-53-60.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
