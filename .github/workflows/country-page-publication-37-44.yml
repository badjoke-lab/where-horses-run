name: Country page publication 37-44

on:
  pull_request:
    paths:
      - 'data/static/country-page-countries-37-44.json'
      - 'data/static/country-page-sources-37-44.json'
      - 'data/static/country-profiles-v2-*.json'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/runbooks/pr-308.md'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/lib/**'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'src/styles/**'
      - 'scripts/check-country-page-publication-37-44.mjs'
      - 'scripts/check-country-profiles-37-44.mjs'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - '.github/workflows/country-page-publication-37-44.yml'
  push:
    branches: [main]
    paths:
      - 'data/static/country-page-countries-37-44.json'
      - 'data/static/country-page-sources-37-44.json'
      - 'data/static/country-profiles-v2-*.json'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/runbooks/pr-308.md'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/lib/**'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'src/styles/**'
      - 'scripts/check-country-page-publication-37-44.mjs'
      - 'scripts/check-country-profiles-37-44.mjs'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - '.github/workflows/country-page-publication-37-44.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm install
      - run: npm run build
      - run: node scripts/check-country-page-publication-37-44.mjs
      - run: node scripts/check-country-profiles-37-44.mjs
      - run: node scripts/check-country-detail-profile-runtime.mjs
      - run: node scripts/check-country-page-programme.mjs
