name: Apply country detail public timetable

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-runtime-import-guard
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply runtime migrations
        run: |
          node scripts/apply-calendar-runtime-import-cleanup.mjs
          node scripts/apply-country-detail-public-timetable.mjs
      - name: Validate and build
        run: |
          node scripts/check-calendar-runtime-import-boundary.mjs
          npm install --package-lock=false
          npm run build
      - name: Commit runtime migration
        run: |
          rm -f scripts/apply-calendar-runtime-import-cleanup.mjs
          rm -f scripts/apply-country-detail-public-timetable.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Migrate runtime to public timetable projection"
          git push origin HEAD:calendar-runtime-import-guard
