name: Trigger production deployment 21-28

on:
  pull_request:
    paths:
      - '.github/workflows/preview-probe-21-28-v2.yml'

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record merged publication gate
        shell: python
        run: |
          from pathlib import Path

          roadmap_path = Path('docs/country-pages/programme-roadmap.md')
          roadmap = roadmap_path.read_text(encoding='utf-8')

          replacements = [
              ('Latest confirmed merge: PR #310', 'Latest confirmed merge: PR #311'),
              ('Publication gate: PR #311 — Draft; entries 21-28; corrected rendered preview passed', 'Publication gate: PR #311 — merged; entries 21-28 published; production trigger commit active'),
              ('| #311 | Draft publication gate | Corrected rendered preview for entries 21-28 passed; publication state recorded. |', '| #311 | merged | Published entries 21-28 after corrected rendered-preview approval. |'),
              ('| #312 | temporary operations PR | Preview-probe evidence only; close without merge. |', '| #312 | closed, unmerged | Temporary preview-probe evidence only. |'),
              ('| #313 | temporary preview PR | Cloudflare preview trigger only; close without merge. |', '| #313 | closed, unmerged | Temporary Cloudflare preview trigger only. |'),
              ('4. Entries 21-28 are recorded as `published`, with final production deployment still gated on PR merge.\n5. Merge PR #311 without `[CF-Pages-Skip]`, then confirm one production deployment and the two representative production routes.', '4. Entries 21-28 are recorded as `published`.\n5. PR #311 merged as `87eee53b4d6d1cf30f6897012f9dcc8724b53786`.\n6. This roadmap update is the dedicated production trigger; confirm one deployment and the two representative production routes after Cloudflare completes.'),
          ]
          for old, new in replacements:
              if old not in roadmap:
                  raise SystemExit(f'missing roadmap anchor: {old}')
              roadmap = roadmap.replace(old, new, 1)
          roadmap_path.write_text(roadmap, encoding='utf-8')

          validator_path = Path('scripts/check-country-page-programme-roadmap.mjs')
          validator = validator_path.read_text(encoding='utf-8')
          old = "'Latest confirmed merge: PR #310'"
          new = "'Latest confirmed merge: PR #311'"
          if old not in validator:
              raise SystemExit('missing roadmap-validator merge anchor')
          validator = validator.replace(old, new, 1)
          validator_path.write_text(validator, encoding='utf-8')

      - name: Validate roadmap
        run: |
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs

      - name: Commit production trigger
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/programme-roadmap.md scripts/check-country-page-programme-roadmap.mjs
          git commit -m 'Trigger production deployment for published country pages 21-28'
          git push origin HEAD:main
