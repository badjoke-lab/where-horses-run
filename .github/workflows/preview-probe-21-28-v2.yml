name: Preview reachability 21-28 v2

on:
  pull_request:
    paths:
      - '.github/workflows/preview-probe-21-28-v2.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for Cloudflare branch alias
        shell: bash
        run: |
          set -euo pipefail
          base='https://preview-country-pages-21-28-v2.where-horses-run.pages.dev'
          for attempt in $(seq 1 90); do
            if curl --connect-timeout 10 --max-time 30 -fsSL "$base/countries/hungary/" -o hungary.html \
              && curl --connect-timeout 10 --max-time 30 -fsSL "$base/ja/countries/malta/" -o malta.html; then
              grep -q 'Europe/Budapest' hungary.html
              grep -q 'Europe/Malta' malta.html
              ! grep -q 'Verify the current local UTC offset' hungary.html
              ! grep -q 'After the calendar data model is finalized' hungary.html
              ! grep -q 'カレンダー機能の実データモデルが確定した後' malta.html
              ! grep -q 'この一覧はカレンダーページと同じデータを読む形に差し替えます' malta.html
              echo 'CORRECTED_PREVIEW_REACHABLE_AND_COPY_VALID'
              exit 0
            fi
            if [ "$attempt" -eq 90 ]; then
              echo 'Cloudflare branch alias did not become reachable'
              exit 1
            fi
            sleep 10
          done
