name: Production response diagnostic 21-28

on:
  pull_request:
    paths:
      - '.github/workflows/preview-probe-21-28-v2.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect production responses
        shell: bash
        run: |
          set -u
          base='https://whr.badjoke-lab.com'
          for route in '/countries/hungary/' '/ja/countries/malta/' '/'; do
            safe=$(printf '%s' "$route" | tr '/-' '__')
            echo "=== ROUTE $route ==="
            curl -sS -L --connect-timeout 10 --max-time 30 -D "$safe.headers" -w 'HTTP_STATUS=%{http_code}\nFINAL_URL=%{url_effective}\n' "$base$route" -o "$safe.html"
            echo '-- HEADERS --'
            sed -n '1,20p' "$safe.headers"
            echo '-- TITLE --'
            grep -o '<title[^>]*>[^<]*</title>' "$safe.html" | head -1 || true
            echo '-- CANONICAL --'
            grep -o 'rel="canonical"[^>]*' "$safe.html" | head -1 || true
            echo '-- H1 --'
            grep -o '<h1[^>]*>[^<]*</h1>' "$safe.html" | head -3 || true
            echo '-- SIZE/HASH --'
            wc -c "$safe.html"
            sha256sum "$safe.html"
            echo '-- FIRST 800 BYTES --'
            head -c 800 "$safe.html"
            echo
          done
          exit 0
