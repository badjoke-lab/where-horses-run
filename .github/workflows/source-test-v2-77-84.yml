name: Source Test v2 77-84

on:
  pull_request:
    paths:
      - 'docs/country-pages/98-country-source-test-transitions-77-84.tsv'
      - 'docs/country-pages/programme-roadmap-2026-06-30-source-test-77-84-addendum.md'
      - 'docs/runbooks/source-test-v2-77-84.md'
      - 'docs/timetable-source-tests/7*/source-test-v2.json'
      - 'docs/timetable-source-tests/8*/source-test-v2.json'
      - 'data/static/authority-source-inventory-77-84.json'
      - 'data/static/calendar-readiness-registry-77-84.json'
      - 'scripts/check-source-test-v2-77-84.mjs'
      - '.github/workflows/source-test-v2-77-84.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-pages/98-country-source-test-transitions-77-84.tsv'
      - 'docs/country-pages/programme-roadmap-2026-06-30-source-test-77-84-addendum.md'
      - 'docs/runbooks/source-test-v2-77-84.md'
      - 'docs/timetable-source-tests/7*/source-test-v2.json'
      - 'docs/timetable-source-tests/8*/source-test-v2.json'
      - 'data/static/authority-source-inventory-77-84.json'
      - 'data/static/calendar-readiness-registry-77-84.json'
      - 'scripts/check-source-test-v2-77-84.mjs'
      - '.github/workflows/source-test-v2-77-84.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-source-test-v2-53-60.mjs
      - run: node scripts/check-source-test-v2-61-68.mjs
      - run: node scripts/check-source-test-v2-69-76.mjs
      - run: node scripts/check-source-test-v2-77-84.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
