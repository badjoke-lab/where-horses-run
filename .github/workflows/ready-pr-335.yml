name: Ready PR 335

on:
  push:
    branches: [source-test-v2-69-76-clean]
    paths: ['.github/workflows/ready-pr-335.yml']

permissions:
  contents: write
  pull-requests: write

jobs:
  ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76-clean
          fetch-depth: 0
      - name: Remove one-time workflow
        run: |
          rm .github/workflows/ready-pr-335.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "[CF-Pages-Skip] Remove PR ready helper"
          git push origin HEAD:source-test-v2-69-76-clean
      - name: Mark ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready 335 --repo badjoke-lab/where-horses-run
