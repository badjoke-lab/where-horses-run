name: Country page publication 13-20

on:
  pull_request:
    paths:
      - 'data/static/country-profiles-v2-13-*.json'
      - 'data/static/country-profiles-v2-14-*.json'
      - 'data/static/country-profiles-v2-15-*.json'
      - 'data/static/country-profiles-v2-16-*.json'
      - 'data/static/country-profiles-v2-17-*.json'
      - 'data/static/country-profiles-v2-18-*.json'
      - 'data/static/country-profiles-v2-19-*.json'
      - 'data/static/country-profiles-v2-20-*.json'
      - 'docs/country-pages/**'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'scripts/check-country-page-publication-13-20.mjs'
      - '.github/workflows/country-page-publication-13-20.yml'
  push:
    branches: [main]
    paths:
      - 'data/static/country-profiles-v2-13-*.json'
      - 'data/static/country-profiles-v2-14-*.json'
      - 'data/static/country-profiles-v2-15-*.json'
      - 'data/static/country-profiles-v2-16-*.json'
      - 'data/static/country-profiles-v2-17-*.json'
      - 'data/static/country-profiles-v2-18-*.json'
      - 'data/static/country-profiles-v2-19-*.json'
      - 'data/static/country-profiles-v2-20-*.json'
      - 'docs/country-pages/**'
      - 'src/components/CountryDetailPage.astro'
      - 'src/layouts/BaseLayout.astro'
      - 'src/pages/countries/**'
      - 'src/pages/ja/countries/**'
      - 'scripts/check-country-page-publication-13-20.mjs'
      - '.github/workflows/country-page-publication-13-20.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm install
      - run: npm run build
      - run: node scripts/check-country-page-publication-13-20.mjs
