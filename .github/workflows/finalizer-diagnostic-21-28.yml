name: Finalizer diagnostic 21-28

on:
  pull_request:
    paths:
      - '.github/workflows/finalizer-diagnostic-21-28.yml'

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-21-28-publication-final

      - name: Run finalizer and expose exact error
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          import textwrap

          source = Path('.github/workflows/finalize-country-pages-21-28.yml').read_text(encoding='utf-8')
          start = '      - name: Apply approved publication state and roadmap renumbering\n        shell: python\n        run: |\n'
          end = '\n      - name: Validate finalized publication state\n'
          block = source.split(start, 1)[1].split(end, 1)[0]
          script = textwrap.dedent(block)
          Path('/tmp/finalizer.py').write_text(script, encoding='utf-8')
          result = subprocess.run(['python', '/tmp/finalizer.py'], text=True, capture_output=True)
          print('FINALIZER_RETURN_CODE', result.returncode)
          print(result.stdout)
          print(result.stderr)
          raise SystemExit(result.returncode)
