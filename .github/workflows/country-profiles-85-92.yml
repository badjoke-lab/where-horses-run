name: Country profiles 85-92

on:
  pull_request:
    paths:
      - 'data/static/country-page-countries-85-92.json'
      - 'data/static/country-page-sources-85-92.json'
      - 'data/static/country-profiles-v2-8*.json'
      - 'data/static/country-profiles-v2-9*.json'
      - 'docs/country-pages/98-country-profile-transitions-85-92.tsv'
      - 'scripts/apply-profile-v2-85-92-loader.mjs'
      - 'scripts/check-country-profiles-85-92.mjs'
      - 'scripts/check-country-detail-profile-runtime-85-92.mjs'
      - 'scripts/check-country-detail-profile-runtime.mjs'
      - 'scripts/merge-pr-130-manual-june-records.mjs'
      - '.github/workflows/country-profiles-85-92.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-profiles-85-92.mjs
      - run: node scripts/check-country-detail-profile-runtime.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
