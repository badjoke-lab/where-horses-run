name: Review note updater check

on:
  pull_request:
    paths:
      - 'scripts/finalize-country-notes-53-60.mjs'
      - '.github/workflows/diagnose-country-notes-53-60.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Run updater and preserve output
        run: |
          node scripts/finalize-country-notes-53-60.mjs > updater-output.txt 2>&1 || true
          cat updater-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: country-notes-53-60-updater-output
          path: updater-output.txt
          if-no-files-found: error
