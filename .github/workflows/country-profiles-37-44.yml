name: Country profiles 37-44

on:
  pull_request:
    paths:
      - 'data/static/country-page-countries-37-44.json'
      - 'data/static/country-page-sources-37-44.json'
      - 'data/static/country-profiles-v2-*.json'
      - 'docs/country-pages/**'
      - 'docs/runbooks/pr-307.md'
      - 'src/lib/data.ts'
      - 'scripts/check-country-*.mjs'
      - '.github/workflows/country-profiles-37-44.yml'
  push:
    branches: [main]
    paths:
      - 'data/static/country-page-countries-37-44.json'
      - 'data/static/country-page-sources-37-44.json'
      - 'data/static/country-profiles-v2-*.json'
      - 'docs/country-pages/**'
      - 'docs/runbooks/pr-307.md'
      - 'src/lib/data.ts'
      - 'scripts/check-country-*.mjs'
      - '.github/workflows/country-profiles-37-44.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-profiles-37-44.mjs
      - run: node scripts/check-country-detail-profile-runtime.mjs
      - run: node scripts/check-country-notes-37-44.mjs
      - run: node scripts/check-country-source-tests-37-44.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
