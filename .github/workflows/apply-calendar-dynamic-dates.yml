name: Apply Calendar dynamic dates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-dynamic-dates
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply Dynamic Dates migration
        run: node scripts/apply-calendar-dynamic-date-core.mjs
      - name: Validate source contract
        run: |
          node scripts/check-calendar-dynamic-dates.mjs
          node scripts/check-calendar-runtime-import-boundary.mjs
          node scripts/check-calendar-pipeline-v1-release-gate.mjs
      - name: Install dependencies
        run: npm install --package-lock=false
      - name: Build meeting fixture window
        env:
          WHR_CALENDAR_REFERENCE_DATE: '2026-06-06'
          WHR_CALENDAR_TIMEZONE: 'Asia/Tokyo'
        run: |
          rm -rf dist
          npm run build
          node scripts/check-calendar-dynamic-dates-rendered.mjs
      - name: Build current stale window
        env:
          WHR_CALENDAR_REFERENCE_DATE: '2026-07-01'
          WHR_CALENDAR_TIMEZONE: 'Asia/Tokyo'
        run: |
          set +e
          rm -rf dist
          npm run build > /tmp/dynamic-dates-current.log 2>&1
          status=$?
          if [ $status -eq 0 ]; then
            node scripts/check-calendar-dynamic-dates-rendered.mjs >> /tmp/dynamic-dates-current.log 2>&1
            status=$?
          fi
          cat /tmp/dynamic-dates-current.log
          exit $status
      - name: Upload current-window diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-dates-current-window-diagnostic
          path: /tmp/dynamic-dates-current.log
          if-no-files-found: error
          retention-days: 30
      - name: Commit Dynamic Dates migration
        run: |
          rm -f scripts/apply-calendar-dynamic-date-core.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement Calendar Dynamic Dates core"
          git push origin HEAD:calendar-dynamic-dates
