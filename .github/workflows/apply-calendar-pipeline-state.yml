name: Apply Calendar pipeline state

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: calendar-pipeline-release-gate
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Apply state updates
        run: node scripts/apply-calendar-pipeline-v1-completion.mjs
      - name: Validate grouped checks
        run: node scripts/check-calendar-pipeline-v1-release-gate.mjs
      - name: Validate governance
        run: |
          node scripts/check-calendar-contracts.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-baseline-reconciliation.mjs
      - name: Build and rendered QA
        run: |
          npm install --package-lock=false
          npm run build
          node scripts/check-calendar-public-projection-rendered-qa.mjs
      - name: Commit state updates
        run: |
          rm -f scripts/apply-calendar-pipeline-v1-completion.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Calendar Pipeline v1"
          git push origin HEAD:calendar-pipeline-release-gate
