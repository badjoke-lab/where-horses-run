name: Finalize country pages 21-28

on:
  push:
    branches:
      - country-pages-21-28-publication-final
    paths:
      - '.github/workflows/finalize-country-pages-21-28.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-21-28-publication-final
          fetch-depth: 0

      - name: Apply approved publication state and roadmap renumbering
        shell: python
        run: |
          from pathlib import Path

          root = Path('.')
          publication_date = '2026-06-22'
          targets = {str(number) for number in range(21, 29)}

          tracker_path = root / 'docs/country-pages/98-country-tracker.tsv'
          tracker_lines = tracker_path.read_text(encoding='utf-8').rstrip('\n').split('\n')
          headers = tracker_lines[0].split('\t')
          index = {name: position for position, name in enumerate(headers)}
          updated_lines = [tracker_lines[0]]
          changed_rows = 0
          for line in tracker_lines[1:]:
              values = line.split('\t')
              if values[index['delivery_no']] in targets:
                  values[index['programme_status']] = 'published'
                  values[index['en_route_status']] = 'published'
                  values[index['ja_route_status']] = 'published'
                  values[index['qa_status']] = 'passed'
                  values[index['page_published_at']] = publication_date
                  values[index['remarks']] = 'Published after corrected rendered Cloudflare preview and bilingual public-boundary QA.'
                  changed_rows += 1
              updated_lines.append('\t'.join(values))
          if changed_rows != 8:
              raise SystemExit(f'expected 8 tracker rows; updated {changed_rows}')
          tracker_path.write_text('\n'.join(updated_lines) + '\n', encoding='utf-8')

          programme_path = root / 'scripts/check-country-page-programme.mjs'
          programme = programme_path.read_text(encoding='utf-8')
          old_slugs = """  'uruguay', 'sweden', 'denmark', 'czech-republic'\n];"""
          new_slugs = """  'uruguay', 'sweden', 'denmark', 'czech-republic', 'hungary', 'malta', 'austria', 'puerto-rico',\n  'jamaica', 'trinidad-and-tobago', 'barbados', 'martinique'\n];"""
          if old_slugs not in programme:
              raise SystemExit('published slug anchor not found')
          programme = programme.replace(old_slugs, new_slugs, 1)
          old_counts = "{ published: 20, profile_ready: 24, source_tested: 0, note_reviewed: 8, page_qa: 0, not_started: 46 }"
          new_counts = "{ published: 28, profile_ready: 16, source_tested: 0, note_reviewed: 8, page_qa: 0, not_started: 46 }"
          if old_counts not in programme:
              raise SystemExit('programme count anchor not found')
          programme = programme.replace(old_counts, new_counts, 1)
          programme = programme.replace(
              "PROGRAMME_COUNTS: published=20 profile_ready=24 note_reviewed=8 not_started=46",
              "PROGRAMME_COUNTS: published=28 profile_ready=16 note_reviewed=8 not_started=46",
              1,
          )
          programme_path.write_text(programme, encoding='utf-8')

          roadmap_path = root / 'docs/country-pages/programme-roadmap.md'
          roadmap = roadmap_path.read_text(encoding='utf-8')

          def must_replace(old, new, label):
              global roadmap
              if old not in roadmap:
                  raise SystemExit(f'roadmap anchor not found: {label}')
              roadmap = roadmap.replace(old, new, 1)

          must_replace('Last roadmap review: 2026-06-20', 'Last roadmap review: 2026-06-22', 'review date')
          must_replace(
              """Latest confirmed merge: PR #309
Publication gate: PR #300 — Draft; entries 21-28; Cloudflare preview pending
Second publication gate: PR #304 — Draft; entries 29-36; Cloudflare preview pending
Third publication gate: PR #308 — Draft; entries 37-44; Cloudflare preview pending
Parallel working PR: #310
Parallel working branch: country-notes-45-52
Next PR after #310: #311
Final release gate: #337""",
              """Latest confirmed merge: PR #310
Publication gate: PR #311 — Draft; entries 21-28; corrected rendered preview passed
Second publication gate: PR #304 — stale Draft; entries 29-36; rebuild from latest main required
Third publication gate: PR #308 — stale Draft; entries 37-44; rebuild from latest main required
Next working PR: #314
Next working branch: country-profiles-45-52
Final release gate: #340""",
              'current position',
          )
          must_replace('Current tracker counts on the PR #310 head:', 'Current tracker counts after corrected preview approval:', 'count heading')
          must_replace(
              """published:       20
profile_ready:   24
note_reviewed:    8
source_tested:    0
not_started:     46
total:           98""",
              """published:       28
profile_ready:   16
note_reviewed:    8
source_tested:    0
not_started:     46
total:           98""",
              'count block',
          )
          must_replace(
              """formally published English routes:   20
formally published Japanese routes:  20
formally published total routes:     40
profile-ready English routes:        24
profile-ready Japanese routes:       24
profile-ready total routes:          48
final target routes:                196""",
              """formally published English routes:   28
formally published Japanese routes:  28
formally published total routes:     56
profile-ready English routes:        16
profile-ready Japanese routes:       16
profile-ready total routes:          32
final target routes:                196""",
              'route state',
          )
          must_replace(
              'PR #300, PR #304, and PR #308 remain independent publication gates. They must not merge or mark their entries published until their respective final rendered Cloudflare previews are reviewed. Source-test, reviewed-note, and Profile v2 work continues independently without Cloudflare.',
              'PR #311 replaces the closed, superseded PR #300 for entries 21-28. PR #304 and PR #308 remain stale Draft gates and must be rebuilt from the latest main before their own rendered previews. Source-test, reviewed-note, and Profile v2 work continues independently without Cloudflare.',
              'gate paragraph',
          )
          must_replace(
              '| #300 | Draft gate | GitHub QA for entries 21-28 passed; rendered preview remains. |',
              '| #300 | closed, superseded | Replaced by PR #311; retained only as historical reference. |',
              'PR 300 row',
          )
          must_replace(
              '| #309 | merged | Added official source tests for entries 45-52. |',
              """| #309 | merged | Added official source tests for entries 45-52. |
| #310 | merged | Added reviewed notes for entries 45-52 and remediated public country-page copy. |
| #311 | Draft publication gate | Corrected rendered preview for entries 21-28 passed; publication state recorded. |
| #312 | temporary operations PR | Preview-probe evidence only; close without merge. |
| #313 | temporary preview PR | Cloudflare preview trigger only; close without merge. |""",
              'completed rows 309-313',
          )
          must_replace(
              """### PR #300 — entries 21-28

Remaining work:

1. Create or move one final `preview-*` branch to the reviewed head.
2. Review representative A and C pages in English and Japanese.
3. Check responsive layout, source links, language switching, and empty states.
4. Advance passing rows to `published`.
5. Merge without `[CF-Pages-Skip]` and confirm one production deployment.""",
              """### PR #311 — entries 21-28

Corrected preview status:

1. Cloudflare deployment `19067203` succeeded from the preview-only branch.
2. Representative Hungary and Malta pages passed rendered English/Japanese HTML checks.
3. Desktop and mobile screenshots passed responsive review with Japanese CJK fonts.
4. Entries 21-28 are recorded as `published`, with final production deployment still gated on PR merge.
5. Merge PR #311 without `[CF-Pages-Skip]`, then confirm one production deployment and the two representative production routes.""",
              'publication gate section',
          )
          must_replace(
              """| #309 | merged | Added official source tests and advanced all eight entries to `source_tested`. |
| #310 | in progress | Add reviewed notes and advance all eight entries to `note_reviewed`. |
| #311 | next | Add Profile v2 records and reach `profile_ready`. |
| #312 | planned | QA and publish sixteen routes after one final rendered preview. |""",
              """| #309 | merged | Added official source tests and advanced all eight entries to `source_tested`. |
| #310 | merged | Added reviewed notes and advanced all eight entries to `note_reviewed`. |
| #314 | next | Add Profile v2 records and reach `profile_ready`. |
| #315 | planned | QA and publish sixteen routes after one final rendered preview. |""",
              'wave 45-52 table',
          )
          must_replace(
              """| 45-52 | #309 | #310 | #311 | #312 |
| 53-60 | #313 | #314 | #315 | #316 |
| 61-68 | #317 | #318 | #319 | #320 |
| 69-76 | #321 | #322 | #323 | #324 |
| 77-84 | #325 | #326 | #327 | #328 |
| 85-92 | #329 | #330 | #331 | #332 |
| 93-98 | #333 | #334 | #335 | #336 |""",
              """| 45-52 | #309 | #310 | #314 | #315 |
| 53-60 | #316 | #317 | #318 | #319 |
| 61-68 | #320 | #321 | #322 | #323 |
| 69-76 | #324 | #325 | #326 | #327 |
| 77-84 | #328 | #329 | #330 | #331 |
| 85-92 | #332 | #333 | #334 | #335 |
| 93-98 | #336 | #337 | #338 | #339 |""",
              'remaining schedule',
          )
          roadmap = roadmap.replace('### PR #337 — full programme audit', '### PR #340 — full programme audit', 1)
          roadmap = roadmap.replace('PR #337 adds no new country scope.', 'PR #340 adds no new country scope.', 1)
          roadmap = roadmap.replace('after PR #337 is merged', 'after PR #340 is merged', 1)
          roadmap_path.write_text(roadmap, encoding='utf-8')

          roadmap_validator_path = root / 'scripts/check-country-page-programme-roadmap.mjs'
          validator = roadmap_validator_path.read_text(encoding='utf-8')
          validator = validator.replace('for (let pr = 284; pr <= 337; pr += 1)', 'for (let pr = 284; pr <= 340; pr += 1)', 1)
          old_phrases = """  'Publication gate: PR #300',
  'Second publication gate: PR #304',
  'Third publication gate: PR #308',
  'Parallel working PR: #310',
  'Next PR after #310: #311',
  'Latest confirmed merge: PR #309',
  'Final release gate: #337',"""
          new_phrases = """  'Publication gate: PR #311',
  'Second publication gate: PR #304',
  'Third publication gate: PR #308',
  'Next working PR: #314',
  'Next working branch: country-profiles-45-52',
  'Latest confirmed merge: PR #310',
  'Final release gate: #340',"""
          if old_phrases not in validator:
              raise SystemExit('roadmap validator phrase anchor not found')
          validator = validator.replace(old_phrases, new_phrases, 1)
          validator = validator.replace("console.log('PR_RANGE: 284-337');", "console.log('PR_RANGE: 284-340');", 1)
          validator = validator.replace(
              "console.log('CURRENT_WORK: publication gates 300 and 304; publication gates 300, 304, and 308; reviewed notes PR 310; next PR 311');",
              "console.log('CURRENT_WORK: publication gate 311; stale gates 304 and 308; next Profile v2 PR 314');",
              1,
          )
          roadmap_validator_path.write_text(validator, encoding='utf-8')

          runbook_path = root / 'docs/runbooks/country-pages-21-28-publication-final.md'
          runbook = runbook_path.read_text(encoding='utf-8')
          evidence = """

## Corrected rendered preview approval

Approved on 2026-06-22.

```text
Immutable preview:
https://19067203.where-horses-run.pages.dev

Representative routes:
/countries/hungary/
/ja/countries/malta/
```

The rendered HTML passed timezone, canonical, language-switch, public-copy, heading, C-column, and prohibited-embed checks. Desktop and mobile screenshots were reviewed with Japanese CJK fonts. Production remains gated on a no-skip merge of PR #311.
"""
          if '## Corrected rendered preview approval' not in runbook:
              runbook = runbook.rstrip() + evidence
          runbook_path.write_text(runbook.rstrip() + '\n', encoding='utf-8')

      - name: Validate finalized publication state
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm run build
          node scripts/check-country-page-publication-21-28.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs

      - name: Commit finalized publication state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md docs/runbooks/country-pages-21-28-publication-final.md scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs
          git commit -m '[CF-Pages-Skip] Finalize publication records for country pages 21-28'
          git push origin HEAD:country-pages-21-28-publication-final
