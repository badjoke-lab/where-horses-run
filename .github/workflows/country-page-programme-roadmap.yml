name: Country page programme roadmap

on:
  pull_request:
    paths:
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/README.md'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-page-programme-roadmap.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/README.md'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-page-programme-roadmap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-page-programme-roadmap.mjs
