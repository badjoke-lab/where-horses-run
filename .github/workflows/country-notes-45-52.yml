name: Country notes 45-52

on:
  pull_request:
    paths:
      - 'docs/country-page-notes/4*.md'
      - 'docs/country-page-notes/5*.md'
      - 'docs/country-pages/**'
      - 'scripts/check-country-notes-45-52.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-notes-45-52.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-page-notes/4*.md'
      - 'docs/country-page-notes/5*.md'
      - 'docs/country-pages/**'
      - 'scripts/check-country-notes-45-52.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-notes-45-52.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-notes-45-52.mjs
      - run: node scripts/check-country-source-tests-45-52.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
