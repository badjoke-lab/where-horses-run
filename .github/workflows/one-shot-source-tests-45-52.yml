name: One-shot source tests 45-52

on:
  push:
    branches: [country-source-tests-45-52]

permissions:
  contents: write

jobs:
  update:
    if: ${{ !contains(github.event.head_commit.message, '[45-52-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-source-tests-45-52
      - run: node scripts/advance-source-tests-45-52.mjs
      - run: bash scripts/commit-source-tests-45-52.sh
