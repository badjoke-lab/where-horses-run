name: PR 289 repair tracker

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/pr-289-repair-tracker.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'country-profiles-01-04'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: country-profiles-01-04
          fetch-depth: 0

      - name: Rebuild tracker from main
        shell: bash
        run: |
          git show origin/main:docs/country-pages/98-country-tracker.tsv > /tmp/main-tracker.tsv
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const file = '/tmp/main-tracker.tsv';
          const lines = fs.readFileSync(file, 'utf8').trimEnd().split(/\r?\n/);
          const headers = lines[0].split('\t');
          const targets = new Map([
            ['01', 'Reviewed profile-v2 and bilingual routes ready; formal QA and publication remain.'],
            ['02', 'Reviewed profile-v2 and bilingual routes ready; formal QA and publication remain.'],
            ['03', 'Reviewed profile-v2 and bilingual routes ready; formal QA and publication remain.'],
            ['04', 'Reviewed link-first profile-v2 ready; timetable source remains unresolved and formal QA remains.']
          ]);
          const output = lines.slice(1).map((line) => {
            const values = line.split('\t');
            while (values.length < headers.length) values.push('');
            const row = Object.fromEntries(headers.map((header, index) => [header, values[index] ?? '']));
            if (!targets.has(row.delivery_no)) return headers.map((header) => row[header] ?? '').join('\t');
            row.programme_status = 'profile_ready';
            row.profile_status = 'reviewed';
            row.en_route_status = 'complete';
            row.ja_route_status = 'complete';
            row.qa_status = 'not_started';
            row.profile_last_reviewed = '2026-06-17';
            row.page_published_at = '';
            row.remarks = targets.get(row.delivery_no);
            return headers.map((header) => row[header] ?? '').join('\t');
          });
          fs.writeFileSync('docs/country-pages/98-country-tracker.tsv', `${lines[0]}\n${output.join('\n')}\n`);
          NODE
          node scripts/check-country-page-programme.mjs

      - name: Commit repaired tracker
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv
          git commit -m 'Repair country page tracker column structure'
          git push origin HEAD:country-profiles-01-04
