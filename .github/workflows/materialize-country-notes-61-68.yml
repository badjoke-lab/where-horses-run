name: Materialize country notes 61-68

on:
  pull_request:
    paths:
      - 'scripts/materialize-country-notes-61-68.mjs'
      - 'scripts/patch-note-roadmap-61-68.mjs'
      - '.github/workflows/materialize-country-notes-61-68.yml'
  push:
    branches: [country-notes-61-68]
    paths:
      - 'scripts/materialize-country-notes-61-68.mjs'
      - 'scripts/patch-note-roadmap-61-68.mjs'
      - '.github/workflows/materialize-country-notes-61-68.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-notes-61-68
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: |
          node scripts/materialize-country-notes-61-68.mjs
          node scripts/patch-note-roadmap-61-68.mjs
      - run: node scripts/check-country-notes-61-68.mjs
      - run: node scripts/check-source-test-v2-61-68.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
      - name: Commit materialized state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START-HERE.md docs/project-roadmap.md docs/country-pages/programme-roadmap.md docs/country-pages/98-country-tracker.tsv docs/runbooks/country-notes-61-68.md scripts/check-source-test-v2-61-68.mjs scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs scripts/check-project-governance-docs.mjs scripts/check-calendar-contracts.mjs
          if ! git diff --cached --quiet; then
            git commit -m '[CF-Pages-Skip] Finalize reviewed notes 61-68'
            git push origin HEAD:country-notes-61-68
          fi
