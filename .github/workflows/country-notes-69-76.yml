name: Country notes 69-76

on:
  pull_request:
    paths:
      - 'START-HERE.md'
      - 'docs/project-roadmap.md'
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-page-notes/6*.md'
      - 'docs/country-page-notes/7*.md'
      - 'docs/runbooks/country-notes-69-76.md'
      - 'docs/timetable-source-tests/6*/source-test-v2.json'
      - 'docs/timetable-source-tests/7*/source-test-v2.json'
      - 'scripts/check-country-notes-61-68.mjs'
      - 'scripts/check-country-notes-69-76.mjs'
      - 'scripts/check-source-test-v2-69-76.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - '.github/workflows/country-notes-69-76.yml'
  push:
    branches: [main]
    paths:
      - 'START-HERE.md'
      - 'docs/project-roadmap.md'
      - 'docs/country-pages/programme-roadmap.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-page-notes/6*.md'
      - 'docs/country-page-notes/7*.md'
      - 'docs/runbooks/country-notes-69-76.md'
      - 'docs/timetable-source-tests/6*/source-test-v2.json'
      - 'docs/timetable-source-tests/7*/source-test-v2.json'
      - 'scripts/check-country-notes-61-68.mjs'
      - 'scripts/check-country-notes-69-76.mjs'
      - 'scripts/check-source-test-v2-69-76.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - 'scripts/check-project-governance-docs.mjs'
      - 'scripts/check-calendar-contracts.mjs'
      - '.github/workflows/country-notes-69-76.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-notes-61-68.mjs
      - run: node scripts/check-country-notes-69-76.mjs
      - run: node scripts/check-source-test-v2-69-76.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
