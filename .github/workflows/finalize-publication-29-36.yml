name: Finalize publication state 29-36

on:
  push:
    branches:
      - country-pages-29-36-publication-final
    paths:
      - '.github/workflows/finalize-publication-29-36.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-pages-29-36-publication-final
          fetch-depth: 0
      - name: Apply approved publication state
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import io
          import re

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'missing replacement target: {label}')
              return text.replace(old, new, 1)

          # Tracker: publish entries 29-36 only after the approved immutable preview.
          tracker_path = Path('docs/country-pages/98-country-tracker.tsv')
          source = tracker_path.read_text(encoding='utf-8')
          reader = csv.DictReader(io.StringIO(source), delimiter='\t')
          rows = list(reader)
          if len(rows) != 98:
              raise SystemExit(f'expected 98 tracker rows, found {len(rows)}')

          remarks = {
              '29': 'Published after rendered Cloudflare preview and bilingual public-boundary QA.',
              '30': 'Published after rendered Cloudflare preview and bilingual public-boundary QA; national multi-code coverage remains incomplete.',
              '31': 'Published after rendered Cloudflare preview and bilingual public-boundary QA; wider state and code coverage remains incomplete.',
              '32': 'Published after rendered Cloudflare preview and bilingual public-boundary QA.',
              '33': 'Published after rendered Cloudflare preview and bilingual public-boundary QA.',
              '34': 'Published after rendered Cloudflare preview and bilingual public-boundary QA; national coverage remains incomplete.',
              '35': 'Published after rendered Cloudflare preview and bilingual public-boundary QA.',
              '36': 'Published after rendered Cloudflare preview and bilingual public-boundary QA; national club coverage remains incomplete.',
          }
          seen = set()
          for row in rows:
              delivery = row['delivery_no']
              if delivery not in remarks:
                  continue
              seen.add(delivery)
              if row['programme_status'] not in {'profile_ready', 'page_qa', 'published'}:
                  raise SystemExit(f'{delivery}: unexpected programme status {row["programme_status"]}')
              row['programme_status'] = 'published'
              row['en_route_status'] = 'published'
              row['ja_route_status'] = 'published'
              row['qa_status'] = 'passed'
              row['page_published_at'] = '2026-06-28'
              row['remarks'] = remarks[delivery]
          if seen != set(remarks):
              raise SystemExit(f'missing tracker rows: {sorted(set(remarks) - seen)}')

          output = io.StringIO()
          writer = csv.DictWriter(output, fieldnames=reader.fieldnames, delimiter='\t', lineterminator='\n')
          writer.writeheader()
          writer.writerows(rows)
          tracker_path.write_text(output.getvalue(), encoding='utf-8')

          # Overall project roadmap.
          path = Path('docs/project-roadmap.md')
          text = path.read_text(encoding='utf-8')
          text = replace_once(text, 'Current Work ID: `WHR-CAL-CONTRACT-02`', 'Current Work ID: `WHR-CP-PUB-37-44`', 'project current Work ID')
          text = replace_once(text, 'Next Work ID: `WHR-CP-PUB-29-36`', 'Next Work ID: `WHR-CAL-BACKFILL-01-20`', 'project next Work ID')
          text = replace_once(text, 'published country pages:       28', 'published country pages:       36', 'published count')
          text = replace_once(text, 'profile_ready:                 16', 'profile_ready:                  8', 'profile-ready count')
          text = replace_once(text, 'published routes:              28 EN + 28 JA = 56', 'published routes:              36 EN + 36 JA = 72', 'published route count')
          text = replace_once(text, '- entries 29-36 and 37-44 have stale Draft gates and must be rebuilt from current `main`;', '- entries 29-36 are published after the approved rendered preview;', 'publication debt 29-36')
          text = replace_once(text, '- entries 45-52 need Profile v2 and publication.', '- entries 37-44 still require a current-main publication rebuild;\n- entries 45-52 need Profile v2 and publication.', 'publication debt remaining')
          text = replace_once(text, 'Current Work ID: `WHR-CAL-CONTRACT-02`\n\nDeliver:', 'Completed Work ID: `WHR-CAL-CONTRACT-02` via PR #316.\n\nDelivered:', 'phase 1 status')
          old_phase2 = '''## Phase 2 — clear publication debt

```text
WHR-CP-PUB-29-36
WHR-CP-PUB-37-44
```

Each stale publication gate is rebuilt from current `main`, receives one final rendered preview, then one production deployment.'''
          new_phase2 = '''## Phase 2 — clear publication debt

Current Work ID: `WHR-CP-PUB-37-44`

Completed:

- `WHR-CP-PUB-29-36` via PR #317 after immutable rendered-preview approval.

Remaining:

- `WHR-CP-PUB-37-44`, rebuilt from current `main`, followed by one final preview and one production deployment.'''
          text = replace_once(text, old_phase2, new_phase2, 'phase 2 state')
          path.write_text(text, encoding='utf-8')

          # Development entry point.
          path = Path('START-HERE.md')
          text = path.read_text(encoding='utf-8')
          text = replace_once(text, 'WHR-CAL-CONTRACT-02', 'WHR-CP-PUB-37-44', 'entry current Work ID')
          text = replace_once(text, 'WHR-CP-PUB-29-36', 'WHR-CAL-BACKFILL-01-20', 'entry next Work ID')
          path.write_text(text, encoding='utf-8')

          # Overall governance validator.
          path = Path('scripts/check-project-governance-docs.mjs')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Current Work ID: `WHR-CAL-CONTRACT-02`', 'Current Work ID: `WHR-CP-PUB-37-44`')
          text = text.replace('Next Work ID: `WHR-CP-PUB-29-36`', 'Next Work ID: `WHR-CAL-BACKFILL-01-20`')
          text = text.replace("'START-HERE.md': ['WHR-CAL-CONTRACT-02', 'WHR-CP-PUB-29-36', 'calendar-readiness-registry.json']", "'START-HERE.md': ['WHR-CP-PUB-37-44', 'WHR-CAL-BACKFILL-01-20', 'calendar-readiness-registry.json']")
          text = text.replace('CURRENT_WORK_ID: WHR-CAL-CONTRACT-02', 'CURRENT_WORK_ID: WHR-CP-PUB-37-44')
          text = text.replace('NEXT_WORK_ID: WHR-CP-PUB-29-36', 'NEXT_WORK_ID: WHR-CAL-BACKFILL-01-20')
          path.write_text(text, encoding='utf-8')

          # Calendar contract validator keeps schema rules while following the canonical current state.
          path = Path('scripts/check-calendar-contracts.mjs')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Current Work ID: `WHR-CAL-CONTRACT-02`', 'Current Work ID: `WHR-CP-PUB-37-44`')
          text = text.replace('Next Work ID: `WHR-CP-PUB-29-36`', 'Next Work ID: `WHR-CAL-BACKFILL-01-20`')
          text = text.replace('CURRENT_WORK_ID: WHR-CAL-CONTRACT-02', 'CURRENT_WORK_ID: WHR-CP-PUB-37-44')
          text = text.replace('NEXT_WORK_ID: WHR-CP-PUB-29-36', 'NEXT_WORK_ID: WHR-CAL-BACKFILL-01-20')
          path.write_text(text, encoding='utf-8')

          # Country programme roadmap: update the active state, retain legacy PR schedule only as history.
          path = Path('docs/country-pages/programme-roadmap.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Last roadmap review: 2026-06-22', 'Last roadmap review: 2026-06-28')
          notice = 'The PR-number assignments in the older schedule sections are historical. Active sequencing is defined by `docs/project-roadmap.md` and the 2026-06-28 addendum.\n\n'
          text = replace_once(text, '## 2. Current position\n\n', notice + '## 2. Current position\n\n', 'legacy schedule notice')
          old_position = '''```text
Latest confirmed merge: PR #311
Publication gate: PR #311 — merged; entries 21-28 published; production trigger commit active
Second publication gate: PR #304 — stale Draft; entries 29-36; rebuild from latest main required
Third publication gate: PR #308 — stale Draft; entries 37-44; rebuild from latest main required
Next working PR: #314
Next working branch: country-profiles-45-52
Final release gate: #340
```'''
          new_position = '''```text
Latest confirmed merge: PR #317
Publication gate: PR #317 — entries 29-36 published after approved rendered preview
Current Work ID: WHR-CP-PUB-37-44
Next working branch: country-pages-37-44-publication-final
Final release gate: WHR-AUDIT-COUNTRY-CALENDAR-98
```'''
          text = replace_once(text, old_position, new_position, 'country programme position')
          text = replace_once(text, 'Current tracker counts after corrected preview approval:', 'Current tracker counts after entries 29-36 preview approval:', 'tracker count heading')
          text = replace_once(text, 'published:       28', 'published:       36', 'country published count')
          text = replace_once(text, 'profile_ready:   16', 'profile_ready:    8', 'country profile-ready count')
          text = replace_once(text, 'formally published English routes:   28', 'formally published English routes:   36', 'country EN routes')
          text = replace_once(text, 'formally published Japanese routes:  28', 'formally published Japanese routes:  36', 'country JA routes')
          text = replace_once(text, 'formally published total routes:     56', 'formally published total routes:     72', 'country total routes')
          text = replace_once(text, 'profile-ready English routes:        16', 'profile-ready English routes:         8', 'country profile EN routes')
          text = replace_once(text, 'profile-ready Japanese routes:       16', 'profile-ready Japanese routes:        8', 'country profile JA routes')
          text = replace_once(text, 'profile-ready total routes:          32', 'profile-ready total routes:          16', 'country profile total routes')
          old_summary = 'PR #311 replaces the closed, superseded PR #300 for entries 21-28. PR #304 and PR #308 remain stale Draft gates and must be rebuilt from the latest main before their own rendered previews. Source-test, reviewed-note, and Profile v2 work continues independently without Cloudflare.'
          new_summary = 'PR #317 replaces the closed, superseded PR #304 for entries 29-36. Entries 29-36 passed immutable rendered-preview QA and are published. PR #308 remains a stale Draft gate and must be rebuilt from the latest main for entries 37-44. Source-test, reviewed-note, Profile v2, and Calendar Readiness work continues independently without Cloudflare.'
          text = replace_once(text, old_summary, new_summary, 'country roadmap summary')
          text = replace_once(text, '| #304 | Draft gate | GitHub QA for entries 29-36 passed; rendered preview remains. |', '| #304 | closed, superseded | Replaced by current-main publication PR #317. |', 'PR 304 table row')
          text = replace_once(text, '| #313 | closed, unmerged | Temporary Cloudflare preview trigger only. |', '| #313 | closed, unmerged | Temporary Cloudflare preview trigger only. |\n| #316 | merged | Added machine-readable Source Test v2 and Calendar Readiness contracts. |\n| #317 | publication | Published entries 29-36 after immutable rendered-preview approval. |', 'completed table additions')
          old_gate = '''### PR #304 — entries 29-36

The same final-preview and production sequence applies independently. Until approval, entries 29-36 remain `profile_ready` with no publication date.'''
          new_gate = '''### PR #317 — entries 29-36

Rendered preview approval:

1. Cloudflare deployment `747c0076` succeeded from `preview-country-pages-29-36`.
2. Ireland (A) and United Kingdom (C) passed live English/Japanese HTML checks.
3. Desktop and Pixel 7 screenshots passed responsive and CJK review.
4. Canonical, hreflang, language switching, official links, empty states, and C-column suppression passed.
5. Entries 29-36 are recorded as `published` on 2026-06-28.
6. PR #317 must merge without `[CF-Pages-Skip]`, followed by one production-deployment confirmation.'''
          text = replace_once(text, old_gate, new_gate, 'entries 29-36 gate')
          path.write_text(text, encoding='utf-8')

          # Country programme roadmap validator follows counts and Work IDs instead of obsolete future PR assignments.
          path = Path('scripts/check-country-page-programme-roadmap.mjs')
          text = path.read_text(encoding='utf-8')
          old_loop = '''for (let pr = 284; pr <= 340; pr += 1) {
  if (!roadmap.includes(`#${pr}`)) fail(`roadmap is missing PR #${pr}`);
}'''
          new_loop = '''for (const pr of [284, 311, 316, 317, 340]) {
  if (!roadmap.includes(`#${pr}`)) fail(`roadmap is missing key PR #${pr}`);
}'''
          text = replace_once(text, old_loop, new_loop, 'roadmap PR validation')
          old_phrases = '''  'Publication gate: PR #311',
  'Second publication gate: PR #304',
  'Third publication gate: PR #308',
  'Next working PR: #314',
  'Next working branch: country-profiles-45-52',
  'Latest confirmed merge: PR #311',
  'Final release gate: #340','''
          new_phrases = '''  'Publication gate: PR #317',
  'Current Work ID: WHR-CP-PUB-37-44',
  'Next working branch: country-pages-37-44-publication-final',
  'Latest confirmed merge: PR #317',
  'Final release gate: WHR-AUDIT-COUNTRY-CALENDAR-98','''
          text = replace_once(text, old_phrases, new_phrases, 'roadmap required phrases')
          text = text.replace('PR_RANGE: 284-340', 'KEY_PRS: 284,311,316,317,340')
          text = text.replace('CURRENT_WORK: publication gate 311; stale gates 304 and 308; next Profile v2 PR 314', 'CURRENT_WORK: entries 29-36 published; next Work ID WHR-CP-PUB-37-44')
          path.write_text(text, encoding='utf-8')

          # Publication runbook records the approved evidence and final state.
          path = Path('docs/runbooks/country-pages-29-36-publication-final.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Status: GitHub pre-preview QA', 'Status: rendered preview approved; publication finalization')
          old_state = '''## Current non-publication state

Until rendered preview approval, entries 29-36 remain `profile_ready` with complete bilingual routes and no publication date.'''
          new_state = '''## Rendered preview approval

Approved on 2026-06-28.

```text
Immutable preview: https://747c0076.where-horses-run.pages.dev
Preview branch: preview-country-pages-29-36
A representative: /countries/ireland/ and /ja/countries/ireland/
C representative: /countries/united-kingdom/ and /ja/countries/united-kingdom/
Evidence artifact: rendered-preview-29-36 (artifact 7935963942)
```

Live HTML, desktop screenshots, and Pixel 7 screenshots passed. No horizontal overflow, broken CJK rendering, card-layout failure, prohibited media output, or C-rank time-column leakage was found.

## Publication state

Entries 29-36 are recorded as `published` with `qa_status=passed` and `page_published_at=2026-06-28`. PR #317 now requires a no-skip merge and one production-deployment confirmation.'''
          text = replace_once(text, old_state, new_state, 'runbook approval state')
          path.write_text(text, encoding='utf-8')

          # One-time workflows must not remain in the final PR.
          for temporary in [
              Path('.github/workflows/rendered-preview-qa-29-36.yml'),
              Path('.github/workflows/finalize-publication-29-36.yml'),
          ]:
              temporary.unlink(missing_ok=True)
          PY
      - name: Validate final state
        run: |
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - name: Commit final state
        run: |
          if git diff --quiet; then
            echo 'No publication-state changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '[CF-Pages-Skip] Finalize publication state for entries 29-36'
          git push origin HEAD:country-pages-29-36-publication-final
