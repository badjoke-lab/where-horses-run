name: PR 295 state synchronization

on:
  push:
    branches: [country-profiles-13-20]
    paths: ['.github/workflows/pr-295-sync.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-profiles-13-20
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/pr-295-sync.mjs
      - name: Commit synchronized state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md scripts/check-country-page-programme.mjs scripts/check-country-page-publication-01-12.mjs scripts/check-country-source-tests-13-20.mjs scripts/check-country-page-programme-roadmap.mjs
          git commit -m 'Synchronize profile-ready state 13-20'
          git push origin HEAD:country-profiles-13-20
