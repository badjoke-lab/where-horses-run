name: Generated Data Dry Run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/generated-data-dry-run.yml'
      - 'data/static/sources.json'
      - 'scripts/**'
      - 'package.json'

jobs:
  generated-data-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm install

      - name: Run generated data dry-run
        run: npm run validate:generated-dry-run

      - name: Ensure generated data was not modified
        run: git diff --exit-code data/generated
