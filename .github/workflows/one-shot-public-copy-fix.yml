name: One-shot public copy fix

on:
  push:
    branches: [country-notes-45-52]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[public-copy-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-notes-45-52
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/patch-country-page-public-copy.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[CF-Pages-Skip] Remove internal copy from country pages [public-copy-sync]'
          branch: country-notes-45-52
          file_pattern: src/components/CountryDetailPage.astro
