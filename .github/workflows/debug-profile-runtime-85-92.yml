name: Debug Profile Runtime 85-92

on:
  pull_request:
    paths:
      - 'data/static/country-profiles-v2-*.json'
      - 'scripts/check-country-detail-profile-runtime-85-92.mjs'
      - '.github/workflows/debug-profile-runtime-85-92.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - run: git clone --depth 1 --branch profile-v2-85-92 https://github.com/badjoke-lab/where-horses-run.git repo
      - run: cd repo && node scripts/check-country-detail-profile-runtime-85-92.mjs
