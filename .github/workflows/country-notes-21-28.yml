name: Country notes 21-28

on:
  pull_request:
    paths:
      - 'docs/country-page-notes/21-*.md'
      - 'docs/country-page-notes/22-*.md'
      - 'docs/country-page-notes/23-*.md'
      - 'docs/country-page-notes/24-*.md'
      - 'docs/country-page-notes/25-*.md'
      - 'docs/country-page-notes/26-*.md'
      - 'docs/country-page-notes/27-*.md'
      - 'docs/country-page-notes/28-*.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-notes-21-28.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-notes-21-28.yml'
  push:
    branches: [main]
    paths:
      - 'docs/country-page-notes/21-*.md'
      - 'docs/country-page-notes/22-*.md'
      - 'docs/country-page-notes/23-*.md'
      - 'docs/country-page-notes/24-*.md'
      - 'docs/country-page-notes/25-*.md'
      - 'docs/country-page-notes/26-*.md'
      - 'docs/country-page-notes/27-*.md'
      - 'docs/country-page-notes/28-*.md'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'docs/country-pages/programme-roadmap.md'
      - 'scripts/check-country-notes-21-28.mjs'
      - 'scripts/check-country-page-programme.mjs'
      - 'scripts/check-country-page-programme-roadmap.mjs'
      - '.github/workflows/country-notes-21-28.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-country-notes-21-28.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
