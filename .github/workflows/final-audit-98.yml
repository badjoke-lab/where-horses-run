name: Final audit 98

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  canonicalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: final-audit-98
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Compact canonical data
        run: node scripts/final-audit-98/compact-data.mjs
      - name: Normalize audit generator quoting
        run: node scripts/final-audit-98/normalize-update-code.mjs
      - name: Update canonical code
        run: node scripts/final-audit-98/run-update-code.mjs
      - name: Upload code diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: final-audit-98-code-diagnostic
          path: artifacts/final-audit-98/update-code-error.txt
          if-no-files-found: ignore
          retention-days: 90
      - name: Update canonical documentation
        run: node scripts/final-audit-98/update-docs.mjs
      - name: Reconcile final audit output
        run: node scripts/final-audit-98/finalize-output.mjs
      - run: npm install
      - name: Validate final canonical state
        run: |
          node scripts/check-final-audit-98.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - run: npm run build
      - name: Remove build-only and one-time output
        run: |
          git checkout origin/main -- \
            data/generated/timetable/canonical/meeting-details.json \
            data/generated/timetable/canonical/meetings.json \
            data/generated/timetable/hkjc-normalized-meeting-details.sample.json \
            data/generated/timetable/hkjc-normalized-timetable.sample.json \
            data/generated/timetable/june-2026-calendar.json \
            data/generated/timetable/public/meeting-details.json \
            data/generated/timetable/public/meeting-list.json
          rm -f package-lock.json
          rm -f scripts/final-audit-98.mjs
          rm -rf scripts/final-audit-98
      - name: Export canonical worktree
        run: |
          rm -rf node_modules dist .astro artifacts
          tar -czf /tmp/final-audit-98-worktree.tgz \
            --exclude=.git \
            --exclude=.github/workflows/final-audit-98.yml \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: final-audit-98-clean-worktree
          path: /tmp/final-audit-98-worktree.tgz
          if-no-files-found: error
          retention-days: 90
      - name: Commit canonical audit result to clean branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete final 98-country and Calendar audit"
          git push --force origin HEAD:refs/heads/audit-98-canonical-20260701
