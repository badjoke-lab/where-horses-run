name: Final audit 98

on:
  push:
    branches: [final-audit-98]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  canonicalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Compact canonical data
        run: node scripts/final-audit-98/compact-data.mjs
      - name: Normalize audit generator quoting
        run: node scripts/final-audit-98/normalize-update-code.mjs
      - name: Update canonical code
        run: node scripts/final-audit-98/update-code.mjs
      - name: Update canonical documentation
        run: node scripts/final-audit-98/update-docs.mjs
      - run: npm install
      - name: Validate final canonical state
        run: |
          node scripts/check-final-audit-98.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - run: npm run build
      - name: Create canonical commit object
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request?.head?.sha ?? context.sha;
            const baseCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: headSha });
            const raw = execSync('git status --porcelain=v1', { encoding: 'utf8' }).trim();
            const files = raw ? raw.split('\n')
              .map((line) => line.slice(3))
              .filter((file) => !file.startsWith('data/generated/') && !file.startsWith('artifacts/')) : [];
            if (!files.length) core.setFailed('No canonical files were generated.');
            const entries = [];
            for (const file of files) {
              const content = fs.readFileSync(file).toString('base64');
              const blob = await github.rest.git.createBlob({ owner, repo, content, encoding: 'base64' });
              entries.push({ path: file, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseCommit.data.tree.sha,
              tree: entries
            });
            const created = await github.rest.git.createCommit({
              owner,
              repo,
              message: '[audit-generated] Canonicalize final 98-country state',
              tree: tree.data.sha,
              parents: [headSha]
            });
            fs.mkdirSync('artifacts/final-audit-98', { recursive: true });
            fs.writeFileSync('artifacts/final-audit-98/generated-commit-sha.txt', created.data.sha + '\n');
            fs.writeFileSync('artifacts/final-audit-98/changed-files.txt', files.join('\n') + '\n');
      - uses: actions/upload-artifact@v4
        with:
          name: final-audit-98-generated-commit
          path: artifacts/final-audit-98
          if-no-files-found: error
          retention-days: 90
