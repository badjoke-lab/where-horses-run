name: Apply final publication state 61-68

on:
  push:
    branches: [country-publish-61-68]
    paths:
      - 'scripts/apply-publication-final-*-61-68.mjs'
      - '.github/workflows/apply-publication-final-61-68.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-publish-61-68
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: |
          node scripts/apply-publication-final-tracker-61-68.mjs
          node scripts/apply-publication-final-roadmap-61-68.mjs
          node scripts/apply-publication-final-governance-61-68.mjs
      - run: npm install
      - run: npm run build
      - run: |
          node scripts/check-country-page-publication-61-68.mjs
          node scripts/check-country-profiles-61-68.mjs
          node scripts/check-country-detail-profile-runtime.mjs
          node scripts/check-country-page-programme.mjs
          node scripts/check-country-page-programme-roadmap.mjs
          node scripts/check-project-governance-docs.mjs
          node scripts/check-calendar-contracts.mjs
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: '[CF-Pages-Skip] Finalize publication state 61-68'
          branch: country-publish-61-68
          file_pattern: 'START-HERE.md docs/project-roadmap.md docs/country-pages/programme-roadmap.md docs/country-pages/98-country-tracker.tsv docs/runbooks/country-pages-61-68-publication-final.md docs/runbooks/country-pages-61-68-publication-qa.md scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs scripts/check-calendar-contracts.mjs scripts/check-project-governance-docs.mjs'
