name: PR 298 reviewed-note synchronization

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/pr-298-sync.yml'
      - 'scripts/pr-298-state-sync.mjs'
  push:
    branches: [country-notes-21-28]
    paths:
      - '.github/workflows/pr-298-sync.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'country-notes-21-28'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: country-notes-21-28
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/pr-298-state-sync.mjs
      - name: Commit synchronized state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/country-pages/98-country-tracker.tsv docs/country-pages/programme-roadmap.md scripts/check-country-page-programme.mjs scripts/check-country-page-programme-roadmap.mjs
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[CF-Pages-Skip] Synchronize reviewed-note state 21-28'
          git push origin HEAD:country-notes-21-28
