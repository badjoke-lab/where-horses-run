name: Verify Source Test v2 69-76

on:
  push:
    branches: [source-test-v2-69-76]
    paths:
      - '.github/workflows/verify-source-test-v2-69-76.yml'

concurrency:
  group: verify-source-test-v2-69-76
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: node scripts/check-source-test-v2-53-60.mjs
      - run: node scripts/check-source-test-v2-61-68.mjs
      - run: node scripts/check-source-test-v2-69-76.mjs
      - run: node scripts/check-country-page-programme.mjs
      - run: node scripts/check-country-page-programme-roadmap.mjs
      - run: node scripts/check-project-governance-docs.mjs
      - run: node scripts/check-calendar-contracts.mjs
      - run: npm install
      - run: npm run build
      - name: Record successful verification
        run: |
          cat > docs/runbooks/source-test-v2-69-76-verification.md <<'EOF'
          # Source Test v2 69-76 verification

          Status: passed  
          Verified: 2026-06-30  
          Work ID: `WHR-ST2-69-76`

          Successful checks:

          - Source Test v2 53-60 regression
          - Source Test v2 61-68 regression
          - Source Test v2 69-76 dedicated validation
          - country programme validation
          - country programme roadmap validation
          - project governance validation
          - Calendar contracts validation
          - dependency installation
          - production build

          The verification workflow committed this receipt only after every command succeeded.
          EOF
          rm .github/workflows/verify-source-test-v2-69-76.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "[CF-Pages-Skip] Record Source Test v2 69-76 verification"
          git push origin HEAD:source-test-v2-69-76
