name: Verify Source Test v2 69-76

on:
  push:
    branches: [source-test-v2-69-76]
    paths:
      - '.github/workflows/verify-source-test-v2-69-76.yml'

concurrency:
  group: verify-source-test-v2-69-76
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source-test-v2-69-76
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Run checks and record results
        shell: bash
        run: |
          set +e
          report=docs/runbooks/source-test-v2-69-76-verification.md
          mkdir -p docs/runbooks
          printf '# Source Test v2 69-76 verification\n\nVerified: 2026-06-30  \nWork ID: `WHR-ST2-69-76`\n\n| Check | Exit |\n| --- | ---: |\n' > "$report"
          overall=0
          check() {
            name="$1"
            shift
            "$@" > /tmp/check.log 2>&1
            code=$?
            printf '| %s | %s |\n' "$name" "$code" >> "$report"
            if [ "$code" -ne 0 ]; then
              overall=1
              printf '\n## Failure: %s\n\n```text\n' "$name" >> "$report"
              cat /tmp/check.log >> "$report"
              printf '\n```\n' >> "$report"
            fi
          }
          check 'Source Test 53-60' node scripts/check-source-test-v2-53-60.mjs
          check 'Source Test 61-68' node scripts/check-source-test-v2-61-68.mjs
          check 'Source Test 69-76' node scripts/check-source-test-v2-69-76.mjs
          check 'Country programme' node scripts/check-country-page-programme.mjs
          check 'Programme roadmap' node scripts/check-country-page-programme-roadmap.mjs
          check 'Project governance' node scripts/check-project-governance-docs.mjs
          check 'Calendar contracts' node scripts/check-calendar-contracts.mjs
          check 'Dependency install' npm install
          check 'Production build' npm run build
          if [ "$overall" -eq 0 ]; then
            printf '\nStatus: passed\n' >> "$report"
          else
            printf '\nStatus: failed\n' >> "$report"
          fi
          rm .github/workflows/verify-source-test-v2-69-76.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "[CF-Pages-Skip] Record Source Test v2 69-76 verification"
          git push origin HEAD:source-test-v2-69-76
          exit "$overall"
