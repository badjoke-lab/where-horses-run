name: Country page ID inventory 01-12

on:
  pull_request:
    paths:
      - 'data/static/country-page-id-inventory-01-12.json'
      - 'data/static/country-profiles-v2.json'
      - 'data/static/country-page-sources-*.json'
      - 'data/static/country-page-racecourses-*.json'
      - 'data/static/countries.json'
      - 'data/static/sources.json'
      - 'data/static/racecourses.json'
      - 'data/static/racecourses-extensions.json'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'scripts/check-country-page-id-inventory-01-12.mjs'
      - '.github/workflows/country-page-id-inventory-01-12.yml'
  push:
    branches:
      - main
    paths:
      - 'data/static/country-page-id-inventory-01-12.json'
      - 'data/static/country-profiles-v2.json'
      - 'data/static/country-page-sources-*.json'
      - 'data/static/country-page-racecourses-*.json'
      - 'data/static/countries.json'
      - 'data/static/sources.json'
      - 'data/static/racecourses.json'
      - 'data/static/racecourses-extensions.json'
      - 'docs/country-pages/98-country-tracker.tsv'
      - 'scripts/check-country-page-id-inventory-01-12.mjs'
      - '.github/workflows/country-page-id-inventory-01-12.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm install

      - name: Validate country, source, and racecourse IDs
        id: validate_ids
        shell: bash
        run: |
          set +e
          node scripts/check-country-page-id-inventory-01-12.mjs 2>&1 | tee country-page-id-validation.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: country-page-id-validation
          path: country-page-id-validation.log
          if-no-files-found: error

      - name: Fail when ID validation fails
        if: steps.validate_ids.outputs.status != '0'
        run: exit 1

      - name: Build site
        run: npm run build
